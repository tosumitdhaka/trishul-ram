name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -q --tb=short

  docker:
    name: Build & Push Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        # Strip the leading "v" from the tag (v1.0.1 → 1.0.1) and patch
        # pyproject.toml so the installed wheel carries the exact release version.
        # tram/__init__.py reads version via importlib.metadata at runtime, so
        # this one edit propagates to the CLI, REST API, and package metadata.
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Patched pyproject.toml → version = \"$VERSION\""

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tram
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package & Push Helm chart
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        # Patch Chart.yaml (chart version + appVersion) and values.yaml (image tag)
        # from the git tag. These are workspace-only changes — nothing is committed.
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version: .*/version: $VERSION/" helm/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" helm/Chart.yaml
          sed -i "s/^  tag: \".*\"/  tag: \"$VERSION\"/" helm/values.yaml
          echo "Patched helm/ → $VERSION"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package Helm chart
        run: helm package helm/

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          helm push tram-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
