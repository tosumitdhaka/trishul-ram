name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Bootstrap pip
        run: pip install --no-cache-dir --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ tests/integration/ -q --tb=short \
            --cov=tram \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=75

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build standalone image
        run: docker build -t trishul-ram-ci:standalone -f Dockerfile .

      - name: Build manager image
        run: docker build -t trishul-ram-ci:manager -f Dockerfile.manager .

      - name: Build worker image
        run: docker build -t trishul-ram-ci:worker -f Dockerfile.worker .
