services:

  # ── TRAM daemon ────────────────────────────────────────────────────────────
  tram:
    build: .
    container_name: tram
    ports:
      - "8765:8765"
      - "1162:1162/udp"    # SNMP trap receiver (non-privileged port)

    # Allows containers to reach host services (snmpd on 127.0.0.1:161,
    # snmptrapd on 127.0.0.1:162) via the hostname "host.docker.internal".
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./pipelines:/pipelines          # pipeline YAMLs (read-only at runtime; writable for dev)
      - tram_data:/data                 # SQLite DB + run history
      - ./output:/data/output           # bind-mount output dir for easy local inspection
      - tram_mibs:/data/mibs            # persisted MIBs downloaded via /api/mibs/download

    environment:
      TRAM_PIPELINE_DIR: /pipelines
      TRAM_DB_URL: sqlite:////data/tram.db
      TRAM_PORT: 8765
      TRAM_HOST: 0.0.0.0
      TRAM_LOG_LEVEL: ${TRAM_LOG_LEVEL:-INFO}
      TRAM_LOG_FORMAT: ${TRAM_LOG_FORMAT:-text}
      TRAM_NODE_ID: ${TRAM_NODE_ID:-tram-0}
      # Built-in baked MIBs stay at /mibs; API-downloaded MIBs go to /data/mibs.
      # The SNMP connectors auto-prepend BOTH /mibs and TRAM_MIB_DIR to the MIB search path.
      TRAM_MIB_DIR: /data/mibs
      TRAM_SCHEMA_DIR: /schemas
      # Set to enable /api/schemas/registry/* proxy (e.g. http://schema-registry:8081)
      TRAM_SCHEMA_REGISTRY_URL: ${TRAM_SCHEMA_REGISTRY_URL:-}

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    depends_on:
      - sftp

  # ── SFTP server ────────────────────────────────────────────────────────────
  # atmoz/sftp is a lightweight OpenSSH server.
  # Credentials: tram / tram123
  # Upload directory inside container: /home/tram/upload
  # Accessible from host: sftp://localhost:2222  (user=tram, pass=tram123)
  sftp:
    image: atmoz/sftp:latest
    container_name: tram-sftp
    ports:
      - "2222:22"
    volumes:
      - ./output/sftp:/home/tram/upload   # SFTP uploads appear in ./output/sftp/ on host
    # <username>:<password>[:<uid>[:<gid>[:<homedir>]]]
    command: tram:tram123:1000

volumes:
  tram_data:
  tram_mibs:
