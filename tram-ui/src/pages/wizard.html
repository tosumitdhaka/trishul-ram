<div class="wizard-wrap">

  <!-- Step indicator -->
  <div class="wiz-steps mb-4" id="wiz-steps">
    <div class="wiz-step active" data-step="1"><span class="wiz-num">1</span><span class="wiz-lbl">Basic Info</span></div>
    <div class="wiz-step" data-step="2"><span class="wiz-num">2</span><span class="wiz-lbl">Source</span></div>
    <div class="wiz-step" data-step="3"><span class="wiz-num">3</span><span class="wiz-lbl">Transforms</span></div>
    <div class="wiz-step" data-step="4"><span class="wiz-num">4</span><span class="wiz-lbl">Sinks</span></div>
    <div class="wiz-step" data-step="5"><span class="wiz-num">5</span><span class="wiz-lbl">Review</span></div>
  </div>

  <!-- Step 1 -->
  <div id="wiz-step-1" class="wiz-page">
    <!-- AI describe (shown when AI enabled) -->
    <div id="wiz-ai-section" class="d-none mb-4 p-3 rounded" style="background:#161b22;border:1px solid #30363d">
      <div class="d-flex align-items-center gap-2 mb-2">
        <i class="bi bi-stars" style="color:#8b949e"></i>
        <span class="fw-semibold text-light" style="font-size:13px">Describe your pipeline (AI assist)</span>
        <span class="ms-auto text-secondary" style="font-size:11px" id="wiz-ai-model"></span>
      </div>
      <textarea id="wiz-ai-prompt" rows="2" class="form-control form-control-sm mb-2" style="background:#0d1117;color:#e6edf3;border-color:#30363d;resize:none"
        placeholder="e.g. Poll SFTP every 5 minutes, parse CSV, rename columns, push to Kafka topic pm-raw"></textarea>
      <button class="btn btn-sm btn-outline-secondary" id="wiz-ai-gen-btn" onclick="window._wizAiGenerate?.()">
        <i class="bi bi-stars me-1"></i>Generate with AI
      </button>
      <span id="wiz-ai-status" class="ms-2 text-secondary" style="font-size:12px"></span>
    </div>

    <div class="row g-3">
      <div class="col-6">
        <label class="form-label text-secondary" style="font-size:12px">Pipeline Name <span style="color:#f85149">*</span></label>
        <input type="text" class="form-control form-control-sm" id="wiz-name" placeholder="e.g. sftp-to-kafka" autocomplete="off">
        <div class="form-text" style="font-size:10px;color:#6e7681">Lowercase, hyphens allowed</div>
      </div>
      <div class="col-6">
        <label class="form-label text-secondary" style="font-size:12px">Description <span style="opacity:.5">(optional)</span></label>
        <input type="text" class="form-control form-control-sm" id="wiz-desc" placeholder="What does this pipeline do?">
      </div>
      <div class="col-4">
        <label class="form-label text-secondary" style="font-size:12px">Schedule Type <span style="color:#f85149">*</span></label>
        <select class="form-select form-select-sm" id="wiz-sched-type" onchange="window._wizSchedChange?.()">
          <option value="interval">Interval</option>
          <option value="cron">Cron</option>
          <option value="stream">Stream (continuous)</option>
          <option value="manual">Manual (trigger only)</option>
        </select>
      </div>
      <div class="col-4" id="wiz-interval-row">
        <label class="form-label text-secondary" style="font-size:12px">Run every</label>
        <div class="d-flex gap-2">
          <input type="number" class="form-control form-control-sm" id="wiz-interval-val" value="5" min="1" style="width:80px">
          <select class="form-select form-select-sm" id="wiz-interval-unit">
            <option value="60">minutes</option>
            <option value="1">seconds</option>
            <option value="3600">hours</option>
          </select>
        </div>
      </div>
      <div class="col-4 d-none" id="wiz-cron-row">
        <label class="form-label text-secondary" style="font-size:12px">Cron expression</label>
        <input type="text" class="form-control form-control-sm font-monospace" id="wiz-cron-expr" placeholder="*/5 * * * *">
      </div>
      <div class="col-4">
        <label class="form-label text-secondary" style="font-size:12px">Serializer (input)</label>
        <select class="form-select form-select-sm" id="wiz-serializer">
          <option value="json">json</option>
          <option value="csv">csv</option>
          <option value="xml">xml</option>
          <option value="ndjson">ndjson</option>
          <option value="bytes">bytes (raw)</option>
          <option value="text">text</option>
          <option value="avro">avro</option>
          <option value="protobuf">protobuf</option>
          <option value="msgpack">msgpack</option>
          <option value="parquet">parquet</option>
        </select>
      </div>
    </div>
    <div class="mt-3">
      <a href="#" class="text-secondary" style="font-size:12px" onclick="navigate('editor');return false">
        <i class="bi bi-pencil me-1"></i>Advanced: open blank editor instead
      </a>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="wiz-step-2" class="wiz-page d-none">
    <div class="row g-3">
      <div class="col-4">
        <label class="form-label text-secondary" style="font-size:12px">Source Type <span style="color:#f85149">*</span></label>
        <select class="form-select form-select-sm" id="wiz-src-type" onchange="window._wizRenderSrcFields?.()">
          <option value="">— select —</option>
        </select>
      </div>
      <div class="col-8"></div>
      <div class="col-12" id="wiz-src-fields"></div>
      <div class="col-12">
        <button class="btn btn-sm btn-outline-secondary" onclick="window._wizTestSrc?.()">
          <i class="bi bi-plug me-1"></i>Test Connection
        </button>
        <span id="wiz-src-test-result" class="ms-2" style="font-size:12px"></span>
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div id="wiz-step-3" class="wiz-page d-none">
    <div class="d-flex align-items-center mb-3">
      <span class="text-secondary" style="font-size:13px">Transforms are optional — click Next to skip.</span>
      <button class="btn btn-sm btn-outline-primary ms-auto" onclick="window._wizAddTransform?.()">
        <i class="bi bi-plus"></i> Add Transform
      </button>
    </div>
    <div id="wiz-transforms-list"></div>
  </div>

  <!-- Step 4 -->
  <div id="wiz-step-4" class="wiz-page d-none">
    <div class="d-flex align-items-center mb-3">
      <span class="text-secondary" style="font-size:13px">Add at least one sink.</span>
      <button class="btn btn-sm btn-outline-primary ms-auto" onclick="window._wizAddSink?.()">
        <i class="bi bi-plus"></i> Add Sink
      </button>
    </div>
    <div id="wiz-sinks-list"></div>
  </div>

  <!-- Step 5 -->
  <div id="wiz-step-5" class="wiz-page d-none">
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="fw-semibold text-light" style="font-size:13px">Pipeline YAML</span>
      <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="window._wizDryRun?.()">
        <i class="bi bi-lightning me-1"></i>Dry Run
      </button>
    </div>
    <textarea id="wiz-yaml-preview" class="font-monospace w-100 mb-3"
      style="background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:12px;min-height:340px;resize:vertical"></textarea>
    <div id="wiz-dryrun-result"></div>
  </div>

  <!-- Navigation -->
  <div class="d-flex gap-2 mt-4 pt-3" style="border-top:1px solid #30363d">
    <button class="btn btn-sm btn-secondary" id="wiz-back-btn" onclick="window._wizBack?.()">← Back</button>
    <button class="btn btn-sm btn-primary ms-auto" id="wiz-next-btn" onclick="window._wizNext?.()">Next →</button>
    <button class="btn btn-sm btn-primary d-none" id="wiz-save-btn" onclick="window._wizSave?.()">
      <i class="bi bi-check-lg me-1"></i>Save Pipeline
    </button>
  </div>
</div>
