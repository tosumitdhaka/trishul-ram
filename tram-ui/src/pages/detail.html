<div class="d-flex gap-2 mb-3 align-items-center">
  <button class="btn btn-sm btn-primary" id="detail-run-btn" onclick="window._detailRun?.()">
    <i class="bi bi-play-fill me-1"></i>Run Now
  </button>
  <button class="btn-flat" title="Edit pipeline" onclick="navigate('editor')"><i class="bi bi-pencil"></i></button>
  <button class="btn-flat" title="Download YAML" onclick="window._detailDownload?.()"><i class="bi bi-download"></i></button>
  <button class="btn-flat ms-auto" onclick="navigate('pipelines')"><i class="bi bi-arrow-left me-1"></i></button>
</div>

<div class="row g-2 mb-3" id="detail-cards">
  <div class="col-4"><div class="detail-card"><div class="detail-label">Source</div><div class="detail-val" id="detail-source">—</div></div></div>
  <div class="col-4"><div class="detail-card"><div class="detail-label">Sinks</div><div class="detail-val" id="detail-sinks">—</div></div></div>
  <div class="col-4"><div class="detail-card"><div class="detail-label">Schedule</div><div class="detail-val" id="detail-schedule">—</div></div></div>
  <div class="col-4"><div class="detail-card"><div class="detail-label">Serializers</div><div class="detail-val" id="detail-serializers">—</div></div></div>
  <div class="col-4"><div class="detail-card"><div class="detail-label">Transforms</div><div class="detail-val" id="detail-transforms">—</div></div></div>
  <div class="col-4"><div class="detail-card"><div class="detail-label">Error Policy</div><div class="detail-val" id="detail-error">—</div></div></div>
</div>

<ul class="nav nav-tabs mb-3" id="detail-tabs">
  <li class="nav-item"><a class="nav-link active" href="#" data-tab="runs">Runs</a></li>
  <li class="nav-item"><a class="nav-link" href="#" data-tab="versions">Versions</a></li>
  <li class="nav-item"><a class="nav-link" href="#" data-tab="config">Config</a></li>
  <li class="nav-item"><a class="nav-link" href="#" data-tab="alerts">Alerts</a></li>
</ul>

<!-- YAML Diff modal -->
<div class="modal fade" id="detail-diff-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content" style="background:#0d1117;border:1px solid #30363d">
      <div class="modal-header" style="border-color:#30363d;padding:10px 16px">
        <h6 class="modal-title text-light">
          YAML Diff &mdash; <span id="diff-left-label" class="text-secondary"></span> vs <span id="diff-right-label" class="text-secondary"></span>
        </h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0 d-flex" style="overflow:auto;max-height:70vh">
        <pre id="diff-left-pane"  style="flex:1;margin:0;padding:12px;background:#161b22;font-size:11px;border-right:1px solid #30363d;overflow:auto;min-width:0"></pre>
        <pre id="diff-right-pane" style="flex:1;margin:0;padding:12px;background:#161b22;font-size:11px;overflow:auto;min-width:0"></pre>
      </div>
    </div>
  </div>
</div>

<div class="d-flex gap-2 mb-3 align-items-center">
  <select class="form-select form-select-sm" style="width:130px" id="detail-runs-status">
    <option value="">All status</option>
    <option>success</option><option>failed</option><option>partial</option>
  </select>
  <input type="date" class="form-control form-control-sm" style="width:150px" id="detail-runs-from"/>
  <button class="btn-flat ms-auto" title="Export CSV"><i class="bi bi-download"></i></button>
</div>

<div class="table-wrap">
  <table class="table mb-0">
    <thead><tr>
      <th>Run ID</th><th>Node</th><th>Started</th><th>Duration</th>
      <th>In</th><th>Out</th><th>Skipped</th><th>DLQ</th><th>Status</th><th>Error</th>
    </tr></thead>
    <tbody id="detail-runs-body">
      <tr><td colspan="10" class="text-secondary text-center py-4">Loading…</td></tr>
    </tbody>
  </table>
</div>
