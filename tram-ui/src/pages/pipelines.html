<div class="d-flex gap-2 mb-3 align-items-center">
  <input class="form-control form-control-sm" style="width:220px" id="pl-search" placeholder="Search pipelines…" oninput="window._plFilter?.()"/>
  <select class="form-select form-select-sm" style="width:130px" id="pl-status" onchange="window._plFilter?.()">
    <option value="">All status</option>
    <option>running</option><option>stopped</option><option>error</option><option>disabled</option>
  </select>
  <select class="form-select form-select-sm" style="width:120px" id="pl-type" onchange="window._plFilter?.()">
    <option value="">All types</option>
    <option>stream</option><option>interval</option><option>cron</option><option>manual</option>
  </select>
  <div class="ms-auto d-flex align-items-center gap-2">
    <button class="btn-flat d-flex align-items-center gap-1" style="font-size:13px;color:#8b949e"
            title="Reload pipelines from disk" onclick="window._plReload?.()">
      <i class="bi bi-arrow-repeat" style="font-size:15px"></i> Reload
    </button>
    <button class="btn btn-sm btn-primary" onclick="navigate('editor')">
      <i class="bi bi-plus-lg me-1"></i>New Pipeline
    </button>
  </div>
</div>

<div class="table-wrap">
  <table class="table mb-0" id="pl-table">
    <thead><tr>
      <th>Name</th><th>Source</th><th>Sink(s)</th><th>Schedule</th>
      <th>Status</th><th>Last Run</th><th>Last Status</th><th class="text-end">Actions</th>
    </tr></thead>
    <tbody id="pl-body">
      <tr><td colspan="8" class="text-secondary text-center py-4">Loading…</td></tr>
    </tbody>
  </table>
</div>
