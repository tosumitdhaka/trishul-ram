<div class="row g-3">
  <div class="col-12 col-lg-5">
    <div class="settings-card h-100">
      <div class="fw-semibold mb-3">Connection</div>
      <div class="mb-3">
        <label class="form-label">Trishul-RAM Base URL</label>
        <div class="input-group input-group-sm">
          <input class="form-control form-control-sm" id="cfg-url" placeholder="http://localhost:8765"/>
          <button class="btn btn-outline-secondary" type="button" id="cfg-reset-btn" title="Restore default (window.location.origin)">
            <i class="bi bi-arrow-counterclockwise"></i>
          </button>
        </div>
        <div class="form-text">Base URL of the TRAM daemon</div>
      </div>
      <div class="mb-3">
        <label class="form-label">API Key</label>
        <input class="form-control form-control-sm" id="cfg-key" type="password" placeholder="leave blank if auth disabled"/>
        <div class="form-text">Sent as X-API-Key header</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Poll Interval (seconds)</label>
        <input class="form-control form-control-sm" id="cfg-poll" type="number" value="10"/>
        <div class="form-text">How often the UI refreshes pipeline/run status</div>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-sm btn-primary" id="cfg-save-btn">Save</button>
        <button class="btn btn-sm btn-secondary" id="cfg-test-btn">Test Connection</button>
        <span id="cfg-status" class="ms-2 ui-status ui-status-muted"></span>
      </div>
    </div>
  </div>

  <!-- AI config card -->
  <div class="col-12 col-lg-7">
    <div class="settings-card h-100">
      <div class="fw-semibold mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-stars settings-ai-icon"></i> AI Assist
        <span id="ai-status-badge" class="ms-auto settings-ai-badge settings-inline-badge ui-status ui-status-muted"></span>
      </div>
      <div class="mb-2">
        <label class="form-label">Provider</label>
        <select class="form-select form-select-sm" id="ai-provider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI / compatible</option>
          <option value="bedrock">AWS Bedrock proxy</option>
        </select>
      </div>
      <div class="mb-2">
        <label class="form-label">API Key</label>
        <input class="form-control form-control-sm" id="ai-api-key" type="password"
               placeholder="Leave blank to keep existing"/>
        <div class="form-text" id="ai-key-hint"></div>
      </div>
      <div class="mb-2">
        <label class="form-label">Model <span class="detail-muted-small">(optional — uses default if blank)</span></label>
        <input class="form-control form-control-sm" id="ai-model"
               placeholder="e.g. claude-haiku-4-5-20251001 or gpt-4o-mini"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Base URL <span class="detail-muted-small">(OpenAI-compatible only)</span></label>
        <input class="form-control form-control-sm" id="ai-base-url"
               placeholder="e.g. http://ollama:11434/v1"/>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-sm btn-primary" id="ai-save-btn">Save AI Config</button>
        <button class="btn btn-sm btn-outline-secondary" id="ai-test-btn">Test</button>
        <span id="ai-cfg-status" class="ms-2 ui-status ui-status-muted"></span>
      </div>
      <div class="settings-section-note">
        DB config overrides <code>TRAM_AI_*</code> env vars. API key is stored server-side.
      </div>
    </div>
  </div>

  <!-- Change Password card — only shown when user is logged in -->
  <div class="col-12 col-lg-5 d-none" id="pwd-col">
    <div class="settings-card h-100">
      <div class="fw-semibold mb-3">Change Password</div>
      <div class="mb-2">
        <label class="form-label">Current Password</label>
        <input class="form-control form-control-sm" id="pwd-current" type="password" placeholder="Current password"/>
      </div>
      <div class="mb-2">
        <label class="form-label">New Password</label>
        <input class="form-control form-control-sm" id="pwd-new" type="password" placeholder="Min 6 characters"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm New Password</label>
        <input class="form-control form-control-sm" id="pwd-confirm" type="password" placeholder="Repeat new password"/>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-sm btn-primary" id="pwd-change-btn">Change Password</button>
        <span id="pwd-status" class="ms-2 ui-status ui-status-muted"></span>
      </div>
      <div class="settings-section-note">
        Changes stored in DB, override <code>TRAM_AUTH_USERS</code>. Sessions expire after 8 h.
      </div>
    </div>
  </div>
</div>
