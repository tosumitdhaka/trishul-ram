<div class="page-toolbar">
  <div>
    <div class="fw-semibold">Registered backend plugins from the live daemon</div>
    <div class="text-secondary table-cell-compact">Live registry view with config summaries derived from backend schema.</div>
  </div>
  <input class="form-control form-control-sm page-toolbar-search ms-auto" id="plugins-search" placeholder="Search plugins…"/>
  <span class="count-pill" id="plugins-total-count"></span>
</div>

<div class="row g-3 mb-3" id="plugins-summary">
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card stat-card-tight"><div class="stat-label">Sources</div><div class="stat-val plugins-stat-value" id="plugins-count-sources">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card stat-card-tight"><div class="stat-label">Sinks</div><div class="stat-val plugins-stat-value" id="plugins-count-sinks">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card stat-card-tight"><div class="stat-label">Serializers</div><div class="stat-val plugins-stat-value" id="plugins-count-serializers">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card stat-card-tight"><div class="stat-label">Transforms</div><div class="stat-val plugins-stat-value" id="plugins-count-transforms">0</div></div></div>
</div>

<div id="plugins-body">
  <div class="detail-card text-secondary text-center p-4">Loading…</div>
</div>

<template id="plugins-empty-template">
  <div class="detail-card text-secondary text-center p-4">No plugins match the current filter.</div>
</template>

<template id="plugins-loading-template">
  <div class="detail-card text-secondary text-center p-4">Loading…</div>
</template>

<template id="plugins-error-template">
  <div class="detail-card text-secondary text-center p-4">Failed to load plugins.</div>
</template>
