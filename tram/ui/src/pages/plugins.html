<div class="d-flex align-items-center gap-3 mb-3 flex-wrap">
  <div>
    <div class="fw-semibold">Registered backend plugins from the live daemon</div>
    <div class="text-secondary" style="font-size:12px">Live registry view with config summaries derived from backend schema.</div>
  </div>
  <input class="form-control form-control-sm ms-auto" id="plugins-search" placeholder="Search plugins…" style="width:240px" oninput="window._pluginsFilter?.()"/>
  <span class="count-pill" id="plugins-total-count"></span>
</div>

<div class="row g-3 mb-3" id="plugins-summary">
  <div class="col-12 col-md-6 col-xl-3"><div class="detail-card"><div class="text-secondary" style="font-size:12px">Sources</div><div class="fs-4 fw-semibold" id="plugins-count-sources">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="detail-card"><div class="text-secondary" style="font-size:12px">Sinks</div><div class="fs-4 fw-semibold" id="plugins-count-sinks">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="detail-card"><div class="text-secondary" style="font-size:12px">Serializers</div><div class="fs-4 fw-semibold" id="plugins-count-serializers">0</div></div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="detail-card"><div class="text-secondary" style="font-size:12px">Transforms</div><div class="fs-4 fw-semibold" id="plugins-count-transforms">0</div></div></div>
</div>

<div id="plugins-body">
  <div class="detail-card text-secondary text-center p-4">Loading…</div>
</div>

<template id="plugins-empty-template">
  <div class="detail-card text-secondary text-center p-4">No plugins match the current filter.</div>
</template>

<template id="plugins-loading-template">
  <div class="detail-card text-secondary text-center p-4">Loading…</div>
</template>

<template id="plugins-error-template">
  <div class="detail-card text-secondary text-center p-4">Failed to load plugins.</div>
</template>
