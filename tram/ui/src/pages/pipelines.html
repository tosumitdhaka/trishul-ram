<div class="page-toolbar">
  <input class="form-control form-control-sm page-toolbar-search" id="pl-search" placeholder="Search pipelines…"/>
  <select class="form-select form-select-sm page-toolbar-filter-sm" id="pl-status">
    <option value="">All status</option>
    <option>running</option><option>scheduled</option><option>stopped</option><option>error</option>
  </select>
  <select class="form-select form-select-sm page-toolbar-filter-sm" id="pl-type">
    <option value="">All types</option>
    <option>stream</option><option>interval</option><option>cron</option><option>manual</option>
  </select>
  <div class="ms-auto d-flex align-items-center gap-2 flex-wrap">
    <button class="btn btn-sm btn-outline-secondary detail-action-btn"
            id="pl-refresh-btn"
            title="Refresh status" type="button">
      <i class="bi bi-arrow-clockwise" id="pl-refresh-icon"></i><span>Refresh</span>
    </button>
    <button class="btn btn-sm btn-outline-secondary detail-action-btn"
            id="pl-reload-btn"
            title="Reload pipelines" type="button">
      <i class="bi bi-arrow-repeat" id="pl-reload-icon"></i><span>Reload</span>
    </button>
    <button class="btn btn-sm btn-outline-secondary detail-action-btn" id="pl-import-btn" title="Import pipeline YAML" type="button">
      <i class="bi bi-upload"></i><span>Import</span>
    </button>
    <input type="file" id="pl-import-input" class="hidden-file-input" accept=".yaml,.yml"/>
    <button class="btn btn-sm btn-outline-secondary detail-action-btn" data-bs-toggle="modal" data-bs-target="#pl-templates-modal">
      <i class="bi bi-collection"></i><span>Templates</span>
    </button>
    <button class="btn btn-sm btn-outline-secondary detail-action-btn" disabled title="Wizard temporarily disabled while schema-driven flow is refined">
      <i class="bi bi-magic"></i><span>Wizard Soon</span>
    </button>
    <button class="btn btn-sm btn-primary detail-action-btn" id="pl-new-btn" type="button">
      <i class="bi bi-pencil"></i><span>New Pipeline</span>
    </button>
  </div>
</div>

<!-- Import conflict modal -->
<div class="modal fade" id="pl-import-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content detail-modal-shell">
      <div class="modal-header detail-modal-header">
        <h6 class="modal-title detail-modal-title">Pipeline already exists</h6>
        <button type="button" class="btn-close btn-close-theme" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary pipeline-modal-note">
          Pipeline <strong id="pl-import-name"></strong> already exists.
          Choose how to proceed:
        </p>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-sm btn-primary flex-fill" id="pl-import-replace">
            <i class="bi bi-arrow-repeat me-1"></i>Replace current YAML
          </button>
          <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
        <div class="mt-2">
          <label class="text-secondary pipeline-modal-label">Or import with a new name:</label>
          <div class="d-flex gap-2 mt-1">
            <input class="form-control form-control-sm" id="pl-import-newname" placeholder="new-pipeline-name"/>
            <button class="btn btn-sm btn-secondary" id="pl-import-rename">Import</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Templates Modal -->
<div class="modal fade" id="pl-templates-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered pipeline-template-dialog">
    <div class="modal-content detail-modal-shell">
      <div class="modal-header detail-modal-header flex-wrap gap-2">
        <h6 class="modal-title detail-modal-title d-flex align-items-center gap-2 me-auto">
          <i class="bi bi-collection"></i><span>Pipeline Templates</span>
        </h6>
        <input class="form-control form-control-sm pipeline-template-search" id="pl-tpl-search"
               placeholder="Search…"/>
        <select class="form-select form-select-sm pipeline-template-filter" id="pl-tpl-source">
          <option value="">All sources</option>
        </select>
        <select class="form-select form-select-sm pipeline-template-filter" id="pl-tpl-sink">
          <option value="">All sinks</option>
        </select>
        <select class="form-select form-select-sm pipeline-template-filter" id="pl-tpl-schedule">
          <option value="">All schedules</option>
          <option value="stream">stream</option>
          <option value="interval">interval</option>
          <option value="cron">cron</option>
          <option value="manual">manual</option>
        </select>
        <span class="text-secondary pipeline-template-count" id="pl-tpl-count"></span>
        <button type="button" class="btn-close btn-close-theme" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <!-- List view -->
        <div id="pl-tpl-list-view">
          <table class="table mb-0">
            <thead><tr>
              <th>Name</th><th>Flow</th><th>Schedule</th><th>Description</th><th class="text-end">Actions</th>
            </tr></thead>
            <tbody id="pl-tpl-body">
              <tr><td colspan="5" class="text-secondary text-center py-4">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <!-- YAML preview (inline, replaces list view) -->
        <div id="pl-tpl-yaml-view" class="d-none">
          <div class="d-flex align-items-center gap-2 p-3 detail-modal-header">
            <button class="btn-flat" id="pl-tpl-back-btn" title="Back to list" type="button"><i class="bi bi-arrow-left"></i></button>
            <span class="fw-semibold ms-1 template-card-title" id="pl-tpl-yaml-name"></span>
            <button class="btn btn-sm btn-primary ms-auto" id="pl-tpl-deploy-view-btn" type="button">
              <i class="bi bi-rocket-takeoff me-1"></i>Deploy
            </button>
          </div>
          <pre id="pl-tpl-yaml-body" class="detail-yaml-view pipeline-template-preview"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table class="table mb-0" id="pl-table">
    <thead><tr>
      <th>Name</th><th>Source</th><th>Sink(s)</th><th>Schedule</th>
      <th>Status</th><th>Last Run</th><th>Last Status</th><th class="text-end">Actions</th>
    </tr></thead>
    <tbody id="pl-body">
      <tr><td colspan="8" class="text-secondary text-center py-4">Loading…</td></tr>
    </tbody>
  </table>
</div>
