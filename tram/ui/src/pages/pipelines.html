<div class="d-flex gap-2 mb-3 align-items-center">
  <input class="form-control form-control-sm" style="width:220px" id="pl-search" placeholder="Search pipelines…" oninput="window._plFilter?.()"/>
  <select class="form-select form-select-sm" style="width:130px" id="pl-status" onchange="window._plFilter?.()">
    <option value="">All status</option>
    <option>running</option><option>scheduled</option><option>stopped</option><option>error</option>
  </select>
  <select class="form-select form-select-sm" style="width:120px" id="pl-type" onchange="window._plFilter?.()">
    <option value="">All types</option>
    <option>stream</option><option>interval</option><option>cron</option><option>manual</option>
  </select>
  <div class="ms-auto d-flex align-items-center gap-2">
    <button class="btn-flat d-flex align-items-center gap-1" style="font-size:13px;color:#8b949e"
            title="Refresh status" onclick="window._plRefresh?.()">
      <i class="bi bi-arrow-clockwise" style="font-size:15px"></i>
    </button>
    <button class="btn-flat d-flex align-items-center gap-1" style="font-size:13px;color:#8b949e"
            title="Reload pipelines" onclick="window._plReload?.()">
      <i class="bi bi-arrow-repeat" style="font-size:15px"></i> Reload
    </button>
    <button class="btn btn-sm btn-secondary" title="Import pipeline YAML" onclick="document.getElementById('pl-import-input').click()">
      <i class="bi bi-upload me-1"></i>Import
    </button>
    <input type="file" id="pl-import-input" accept=".yaml,.yml" style="display:none" onchange="window._plImportFile?.(this)"/>
    <button class="btn btn-sm btn-secondary" data-bs-toggle="modal" data-bs-target="#pl-templates-modal">
      <i class="bi bi-collection me-1"></i>Templates
    </button>
    <div class="btn-group">
      <button class="btn btn-sm btn-primary" onclick="navigate('wizard')">
        <i class="bi bi-magic me-1"></i>Wizard
      </button>
      <button class="btn btn-sm btn-outline-primary" onclick="window._editorPipeline=null;window._editorYaml=null;navigate('editor')">
        <i class="bi bi-pencil me-1"></i>YAML
      </button>
    </div>
  </div>
</div>

<!-- Import conflict modal -->
<div class="modal fade" id="pl-import-modal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:#0d1117;border:1px solid #30363d">
      <div class="modal-header" style="border-color:#30363d">
        <h6 class="modal-title text-light">Pipeline already exists</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-secondary" style="font-size:13px">
          Pipeline <strong id="pl-import-name" class="text-light"></strong> already exists.
          Choose how to proceed:
        </p>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-sm btn-primary flex-fill" id="pl-import-replace">
            <i class="bi bi-arrow-repeat me-1"></i>Replace (saves new version)
          </button>
          <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
        <div class="mt-2">
          <label class="text-secondary" style="font-size:12px">Or import with a new name:</label>
          <div class="d-flex gap-2 mt-1">
            <input class="form-control form-control-sm" id="pl-import-newname" placeholder="new-pipeline-name"/>
            <button class="btn btn-sm btn-secondary" id="pl-import-rename">Import</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Templates Modal -->
<div class="modal fade" id="pl-templates-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content" style="background:#0d1117;border:1px solid #30363d">
      <div class="modal-header" style="border-color:#30363d;gap:10px">
        <h6 class="modal-title text-light"><i class="bi bi-collection me-1"></i>Pipeline Templates</h6>
        <input class="form-control form-control-sm" style="width:200px" id="pl-tpl-search"
               placeholder="Search…" oninput="window._tplSearch?.()"/>
        <span class="text-secondary" style="font-size:12px;white-space:nowrap" id="pl-tpl-count"></span>
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0" style="overflow-y:auto;min-height:300px">
        <!-- List view -->
        <div id="pl-tpl-list-view">
          <table class="table mb-0">
            <thead><tr>
              <th>Name</th><th>Flow</th><th>Schedule</th><th>Description</th><th class="text-end">Actions</th>
            </tr></thead>
            <tbody id="pl-tpl-body">
              <tr><td colspan="5" class="text-secondary text-center py-4">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <!-- YAML preview (inline, replaces list view) -->
        <div id="pl-tpl-yaml-view" style="display:none">
          <div class="d-flex align-items-center gap-2 p-3" style="border-bottom:1px solid var(--border);flex-shrink:0">
            <button class="btn-flat" onclick="window._tplBackToList?.()" title="Back to list"><i class="bi bi-arrow-left"></i></button>
            <span class="fw-semibold ms-1" id="pl-tpl-yaml-name" style="font-size:14px"></span>
            <button class="btn btn-sm btn-primary ms-auto" onclick="window._tplDeployFromView?.()">
              <i class="bi bi-rocket-takeoff me-1"></i>Deploy
            </button>
          </div>
          <pre id="pl-tpl-yaml-body" style="margin:0;padding:16px;background:#161b22;font-size:12px;color:#e6edf3;overflow:auto;max-height:55vh"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table class="table mb-0" id="pl-table">
    <thead><tr>
      <th>Name</th><th>Source</th><th>Sink(s)</th><th>Schedule</th>
      <th>Status</th><th>Last Run</th><th>Last Status</th><th class="text-end">Actions</th>
    </tr></thead>
    <tbody id="pl-body">
      <tr><td colspan="8" class="text-secondary text-center py-4">Loading…</td></tr>
    </tbody>
  </table>
</div>
