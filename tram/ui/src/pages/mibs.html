<div class="row g-3">
  <div class="col-8">
    <div class="table-wrap">
      <div class="table-head-row">
        <span class="table-head-title">Compiled MIB Modules</span>
        <span class="count-pill" id="mibs-count"></span>
      </div>
      <table class="table mb-0">
        <thead><tr><th>NAME</th><th>FILE</th><th>SIZE</th><th class="text-end">ACTIONS</th></tr></thead>
        <tbody id="mibs-body">
          <tr><td colspan="4" class="text-secondary text-center py-4">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="col-4 d-flex flex-column gap-3">
    <div class="settings-card">
      <div class="fw-semibold mb-3">Upload MIB File</div>
      <div class="upload-zone mb-3" id="mib-drop-zone">
        <i class="bi bi-file-earmark-arrow-up fs-3 text-secondary"></i>
        <div class="text-secondary mt-2">Drop <code>.mib</code> files or click to browse</div>
        <input type="file" id="mib-file-input" style="display:none" multiple accept=".mib"/>
      </div>
      <button class="btn btn-primary btn-sm w-100" onclick="window._mibsUpload?.()">Upload &amp; Compile</button>
    </div>
    <div class="settings-card">
      <div class="fw-semibold mb-3">Download from mibs.pysnmp.com</div>
      <textarea class="form-control form-control-sm font-monospace mb-2" id="mib-download-names"
                rows="4" placeholder="CISCO-ENTITY-FRU-CONTROL-MIB&#10;CISCO-TC-MIB&#10;JUNIPER-MIB"></textarea>
      <div class="form-text mb-2">One MIB name per line. Dependencies auto-resolved.</div>
      <button class="btn btn-secondary btn-sm w-100" onclick="window._mibsDownload?.()">Download &amp; Compile</button>
    </div>
  </div>
</div>
