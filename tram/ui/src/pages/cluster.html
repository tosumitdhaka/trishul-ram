<div class="d-flex align-items-center gap-3 mb-3" id="cluster-header">
  <span class="text-secondary" id="cluster-status-text">Loading cluster info…</span>
  <button class="btn-flat ms-auto d-flex align-items-center gap-1"
          style="font-size:13px;color:#8b949e"
          id="cluster-refresh-btn"
          title="Refresh cluster status"
          onclick="window._clusterRefresh?.()">
    <i class="bi bi-arrow-clockwise" id="cluster-refresh-icon" style="font-size:15px"></i>
  </button>
</div>

<div class="cluster-strip mb-3" id="cluster-runtime">
  <div class="cluster-strip-item">
    <div class="detail-card h-100">
      <div class="text-secondary mb-1" style="font-size:12px">Execution State</div>
      <div id="cluster-daemon-mode" class="fw-semibold" style="font-size:18px">—</div>
      <div id="cluster-daemon-mode-sub" class="text-secondary mt-2" style="font-size:12px">—</div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="detail-card h-100">
      <div class="text-secondary mb-1" style="font-size:12px">Scheduler</div>
      <div id="cluster-daemon-scheduler" class="fw-semibold" style="font-size:18px">—</div>
      <div class="text-secondary mt-2" style="font-size:12px">Current daemon scheduler state.</div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="detail-card h-100" id="cluster-daemon-db-card">
      <div class="text-secondary mb-1" style="font-size:12px">Database</div>
      <div id="cluster-daemon-db-engine" class="fw-semibold" style="font-size:18px">—</div>
      <div id="cluster-daemon-db-meta" class="text-secondary mt-2" style="font-size:12px">—</div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="detail-card h-100">
      <div class="text-secondary mb-1" style="font-size:12px">Uptime</div>
      <div id="cluster-daemon-uptime" class="fw-semibold" style="font-size:18px">—</div>
      <div class="text-secondary mt-2" style="font-size:12px">Daemon process runtime.</div>
    </div>
  </div>
</div>

<div class="cluster-strip mb-3" id="cluster-summary">
  <div class="cluster-strip-item">
    <div class="stat-card cluster-summary-card">
      <div class="stat-label">Workers / Runtime</div>
      <div class="stat-val" id="cluster-workers-value">—</div>
      <div class="stat-sub" id="cluster-workers-sub"></div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="stat-card cluster-summary-card">
      <div class="stat-label">Active Streams</div>
      <div class="stat-val" id="cluster-streams-value">—</div>
      <div class="stat-sub" id="cluster-streams-sub"></div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="stat-card cluster-summary-card">
      <div class="stat-label">Live Throughput</div>
      <div class="stat-val" id="cluster-throughput-value">—</div>
      <div class="stat-sub" id="cluster-throughput-sub"></div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="stat-card cluster-summary-card">
      <div class="stat-label">Running Pipelines</div>
      <div class="stat-val" id="cluster-running-value">—</div>
      <div class="stat-sub" id="cluster-running-sub"></div>
    </div>
  </div>
  <div class="cluster-strip-item">
    <div class="stat-card cluster-summary-card">
      <div class="stat-label">Errors</div>
      <div class="stat-val" id="cluster-errors-value">—</div>
      <div class="stat-sub" id="cluster-errors-sub"></div>
    </div>
  </div>
</div>

<div class="detail-card mb-3">
  <div class="d-flex align-items-center gap-2 mb-2">
    <div class="detail-label mb-0">Active Streams</div>
    <span class="count-pill" id="cluster-stream-count"></span>
  </div>
  <div id="cluster-streams">
    <div class="text-secondary text-center py-3">Loading…</div>
  </div>
</div>

<div class="detail-card">
  <div class="d-flex align-items-center gap-2 mb-3">
    <div class="detail-label mb-0">Workers / Runtime</div>
    <span class="count-pill" id="cluster-node-count"></span>
  </div>
  <div id="cluster-nodes">
    <div class="p-4 text-secondary text-center">Loading…</div>
  </div>
</div>
