<div class="dashboard-toolbar" id="dashboard-header">
  <span class="text-secondary" id="dashboard-status-text">Loading dashboard…</span>
  <button class="btn-flat ms-auto d-flex align-items-center gap-1 dashboard-refresh-btn"
          id="dash-refresh-btn"
          title="Refresh dashboard">
    <i class="bi bi-arrow-clockwise" id="dash-refresh-icon"></i>
  </button>
</div>

<!-- Top stat cards -->
<div class="row g-3 mb-3" id="dash-stats">
  <div class="col-12 col-md-6 col-xl-4"><div class="stat-card">
    <div class="d-flex align-items-center justify-content-between mb-1">
      <div class="stat-label">Total Pipelines</div>
      <span id="live-dot" class="live-dot is-live" title="Live — updates every 10s"></span>
    </div>
    <div class="stat-val" id="stat-total">—</div>
    <div class="stat-sub" id="stat-total-sub">loading…</div>
  </div></div>
  <div class="col-12 col-md-6 col-xl-4"><div class="stat-card">
    <div class="stat-label">Active</div>
    <div class="stat-val stat-val-success" id="stat-running">—</div>
    <div class="stat-sub" id="stat-running-sub"></div>
  </div></div>
  <div class="col-12 col-md-6 col-xl-4"><div class="stat-card">
    <div class="stat-label">Errors <span class="stat-label-note">(15m)</span></div>
    <div class="stat-val stat-val-danger" id="stat-errors">—</div>
    <div class="stat-sub" id="stat-errors-sub"></div>
  </div></div>
</div>

<div class="row g-3 mb-3" id="dash-traffic-stats">
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card">
    <div class="stat-label">Records In <span class="stat-label-note">(15m)</span></div>
    <div class="stat-val" id="stat-records-in">—</div>
    <div class="stat-sub" id="stat-records-in-sub"></div>
  </div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card">
    <div class="stat-label">Records Out <span class="stat-label-note">(15m)</span></div>
    <div class="stat-val" id="stat-records-out">—</div>
    <div class="stat-sub" id="stat-records-out-sub"></div>
  </div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card">
    <div class="stat-label">Bytes In <span class="stat-label-note">(15m)</span></div>
    <div class="stat-val" id="stat-bytes-in">—</div>
    <div class="stat-sub" id="stat-bytes-in-sub"></div>
  </div></div>
  <div class="col-12 col-md-6 col-xl-3"><div class="stat-card">
    <div class="stat-label">Bytes Out <span class="stat-label-note">(15m)</span></div>
    <div class="stat-val" id="stat-bytes-out">—</div>
    <div class="stat-sub" id="stat-bytes-out-sub"></div>
  </div></div>
</div>

<!-- Sparkline row -->
<div class="row g-3 mb-3">
  <div class="col-12">
    <div class="stat-card stat-card-tight">
      <div class="dashboard-spark-head mb-2">
        <span class="stat-label mb-0" id="spark-label">Bytes processed/5m — last hour</span>
        <span class="detail-muted-small dashboard-spark-meta" id="spark-meta"></span>
        <div class="dashboard-controls">
          <label class="toolbar-label" for="dash-chart-metric">Metric</label>
          <select class="form-select form-select-sm" id="dash-chart-metric">
            <option value="bytes_processed">Bytes processed</option>
            <option value="records_out">Records out</option>
          </select>
          <label class="toolbar-label" for="dash-period">Period</label>
          <select class="form-select form-select-sm" id="dash-period">
            <option value="1h">1 hour</option>
            <option value="6h">6 hours</option>
            <option value="24h">24 hours</option>
          </select>
          <label class="toolbar-label" for="dash-granularity">Buckets</label>
          <select class="form-select form-select-sm" id="dash-granularity">
            <option value="5m">5 min</option>
            <option value="15m">15 min</option>
            <option value="1h">1 hour</option>
          </select>
        </div>
      </div>
      <canvas id="dash-sparkline" class="canvas-fluid" height="48"></canvas>
    </div>
  </div>
</div>

<!-- Pipeline + runs tables -->
<div class="row g-3 align-items-stretch">
  <div class="col-12 col-xl-7">
    <div class="table-wrap overview-panel">
      <div class="table-head-row">
        <span class="table-head-title">Pipelines</span>
        <span class="count-pill" id="dash-pipeline-count"></span>
        <span class="count-pill" id="dash-pipeline-window">last hour</span>
        <button class="btn-flat ms-auto dashboard-nav-btn" id="dash-manage-btn" type="button">Manage →</button>
        <button class="btn btn-sm btn-outline-primary dashboard-new-btn" id="dash-new-btn" type="button"><i class="bi bi-plus"></i> New</button>
      </div>
      <div class="overview-panel-scroll">
        <table class="table mb-0">
          <thead><tr><th>Name</th><th>Status</th><th>Out/hr</th><th>Runs/hr</th><th>Errors</th><th></th></tr></thead>
          <tbody id="dash-pipelines-body">
            <tr><td colspan="6" class="text-secondary text-center py-4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="col-12 col-xl-5">
    <div class="table-wrap overview-panel">
      <div class="table-head-row">
        <span class="table-head-title">Recent Runs</span>
        <span class="count-pill">last 10</span>
        <button class="btn-flat ms-auto dashboard-nav-btn" id="dash-view-runs-btn" type="button">View all →</button>
      </div>
      <div class="overview-panel-scroll">
        <table class="table mb-0">
          <thead><tr><th>Pipeline</th><th>Status</th><th>In</th><th>Out</th><th>Dur</th></tr></thead>
          <tbody id="dash-runs-body">
            <tr><td colspan="5" class="text-secondary text-center py-4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
