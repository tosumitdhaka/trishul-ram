<div class="login-shell">
  <div class="login-panel">
    <div class="text-center mb-4">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" class="login-logo">
        <defs>
          <linearGradient id="tg2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#d97706"/>
          </linearGradient>
        </defs>
        <path d="M57 24.6C54 17.4 44.8 8.7 44.8 8.7s3 7.4.8 17.3l3.5-3s3.3 1.4 3.7 5c.5 4.4-2 10.6-2 10.6s-5.5-1.7-13.9-1.6l-3-19.6l7.2 4.7L32 2l-9 19.9l7.2-4.7l-3 19.6c-8.4-.1-13.9 1.6-13.9 1.6s-2.5-6.2-2-10.6c.4-3.5 3.7-5 3.7-5l3.5 3c-2.2-9.8.8-17.3.8-17.3S10 17.4 7 24.6C3.9 32 2 40.8 2 40.8l6.4 5.9s5.6-1.7 10-2c4.1-.3 8.9-.4 8.9-.4l-.6 8.7l5.3 9l5.3-9l-.6-8.7s4.8.1 8.9.4c4.3.3 10 2 10 2l6.4-5.9s-1.9-8.8-5-16.2" fill="url(#tg2)"/>
      </svg>
      <div class="login-title">Trishul-RAM</div>
      <div class="login-subtitle">Sign in to continue</div>
    </div>
    <form class="settings-card" id="login-form">
      <div class="mb-3">
        <label class="form-label" for="login-user">Username</label>
        <input class="form-control" id="login-user" autocomplete="username" placeholder="admin"/>
      </div>
      <div class="mb-3">
        <label class="form-label" for="login-pass">Password</label>
        <input class="form-control" id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••"/>
      </div>
      <div id="login-error" class="mb-3 login-error d-none" role="alert"></div>
      <button class="btn btn-primary w-100" id="login-btn" type="submit">Sign in</button>
    </form>
  </div>
</div>
