version: "1"

pipeline:
  name: snmp_trap_local_to_receiver
  description: >
    Read one JSON payload from a local directory and send a standard SNMP v2c
    linkDown trap to the configured receiver. Intended for manager-worker test
    setups where webhook sources are not reachable on worker-owned pipelines.

  enabled: true

  schedule:
    type: interval
    interval_seconds: 30

  source:
    type: local
    path: ${TRAM_SNMP_TRAP_INPUT_DIR:-/tmp/tram-snmp-trap/input}
    file_pattern: "*.json"
    move_after_read: ${TRAM_SNMP_TRAP_DONE_DIR:-/tmp/tram-snmp-trap/done}

  serializer_in:
    type: json

  serializer_out:
    type: json

  sink:
    type: snmp_trap
    host: ${TRAM_TRAP_TARGET_HOST:-127.0.0.1}
    port: ${TRAM_TRAP_TARGET_PORT:-1162}
    community: public
    version: "2c"
    trap_oid: "1.3.6.1.6.3.1.1.5.3"
    mib_modules:
      - IF-MIB
    varbinds:
      - oid: "IF-MIB::ifIndex.1"
        value_field: ifIndex
        type: Integer32
      - oid: "IF-MIB::ifDescr.1"
        value_field: ifDescr
        type: OctetString
      - oid: "IF-MIB::ifAdminStatus.1"
        value_field: ifAdminStatus
        type: Integer32
      - oid: "IF-MIB::ifOperStatus.1"
        value_field: ifOperStatus
        type: Integer32
      - oid: "IF-MIB::ifAlias.1"
        value_field: ifAlias
        type: OctetString

  on_error: continue
