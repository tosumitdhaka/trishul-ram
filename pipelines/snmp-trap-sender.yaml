version: "1"

pipeline:
  name: snmp-trap-sender
  description: >
    Webhook-triggered SNMPv2c trap sender. POST a JSON payload to
    /webhooks/send-trap to immediately send a trap with custom varbinds.

    Example payload:
      {
        "ifIndex":       1,
        "ifDescr":       "eth0",
        "ifOperStatus":  1,
        "ifAdminStatus": 1,
        "ifAlias":       "WAN uplink",
        "severity":      "critical",
        "eventTime":     "2026-03-12T14:00:00Z"
      }
  enabled: true

  schedule:
    type: stream          # webhook sources always run in stream mode

  source:
    type: webhook
    path: /send-trap      # full URL: POST http://localhost:8765/webhooks/send-trap
    max_queue_size: 500

  serializer_in:
    type: json

  # No global transforms — pass the webhook payload straight through

  serializer_out:
    type: json

  sink:
    type: snmp_trap
    host: host.docker.internal  # send trap to host (snmptrapd / trap receiver)
    port: 162
    community: public
    version: "2c"
    # Enterprise OID: private enterprise subtree 1.3.6.1.4.1.99999 (demo)
    enterprise_oid: "1.3.6.1.4.1.99999.1.0"

    # Explicit varbind mapping: field name in the JSON → OID + SNMP type
    varbinds:
      - oid: "1.3.6.1.4.1.99999.1.1"
        value_field: ifIndex
        type: Integer32

      - oid: "1.3.6.1.4.1.99999.1.2"
        value_field: ifDescr
        type: OctetString

      - oid: "1.3.6.1.4.1.99999.1.3"
        value_field: ifOperStatus
        type: Integer32

      - oid: "1.3.6.1.4.1.99999.1.4"
        value_field: ifAdminStatus
        type: Integer32

      - oid: "1.3.6.1.4.1.99999.1.5"
        value_field: ifAlias
        type: OctetString

      - oid: "1.3.6.1.4.1.99999.1.6"
        value_field: severity
        type: OctetString

      - oid: "1.3.6.1.4.1.99999.1.7"
        value_field: eventTime
        type: OctetString

    retry_count: 1
    retry_delay_seconds: 2.0

  on_error: continue
