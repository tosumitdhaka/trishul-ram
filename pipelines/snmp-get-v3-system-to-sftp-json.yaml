name: snmp_get_v3_system_to_sftp_json
description: Poll scalar SNMP system OIDs over SNMPv3 and write the result to SFTP as JSON
schedule:
  type: interval
  interval_seconds: 900
source:
  type: snmp_poll
  host: ${SNMP_V3_HOST:-172.25.242.55}
  port: 161
  version: "3"
  security_name: ${SNMP_V3_USER:-tramv3}
  auth_protocol: ${SNMP_V3_AUTH_PROTOCOL:-SHA}
  auth_key: ${SNMP_V3_AUTH_KEY:-tramAuth123!}
  priv_protocol: ${SNMP_V3_PRIV_PROTOCOL:-AES}
  priv_key: ${SNMP_V3_PRIV_KEY:-tramPriv123!}
  operation: get
  mib_modules:
    - SNMPv2-MIB
    - IF-MIB
  oids:
    - 1.3.6.1.2.1.1.1.0   # sysDescr.0
    - 1.3.6.1.2.1.1.3.0   # sysUpTime.0
    - 1.3.6.1.2.1.1.5.0   # sysName.0
    - 1.3.6.1.2.1.2.2.1.5.1  # ifSpeed.1
  resolve_oids: true
serializer_in:
  type: json
transforms:
  - type: add_field
    fields:
      timestamp: "epoch()"
      source_ip: "pipeline.source.host"
      snmp_version: "'3'"
sinks:
  - type: sftp
    host: 172.25.242.55
    port: 22
    username: dhaka
    password: dhaka
    remote_path: /home/dhaka/test/pm/snmp_get_v3/results/
    filename_template: "{pipeline}_{timestamp}.json"
    serializer_out:
      type: json
      indent: 2
on_error: continue
