version: "1"

pipeline:
  name: snmp_walk_v3_iftable_to_sftp_json
  description: Walk IF-MIB ifTable over SNMPv3 and write one JSON row per interface to SFTP
  enabled: true

  schedule:
    type: interval
    interval_seconds: 900

  source:
    type: snmp_poll
    host: ${SNMP_V3_HOST:-snmp.example.com}
    port: 161
    version: "3"
    security_name: ${SNMP_V3_USER:-snmpv3_user}
    auth_protocol: ${SNMP_V3_AUTH_PROTOCOL:-SHA}
    auth_key: ${SNMP_V3_AUTH_KEY:-changeme-auth}
    priv_protocol: ${SNMP_V3_PRIV_PROTOCOL:-AES}
    priv_key: ${SNMP_V3_PRIV_KEY:-changeme-priv}
    operation: walk
    oids:
      - "1.3.6.1.2.1.2.2"
    resolve_oids: true
    mib_modules:
      - IF-MIB
    yield_rows: true
    index_depth: 1
    classify: true

  serializer_in:
    type: json

  transforms:
    - type: add_field
      fields:
        timestamp: "epoch()"
        source_ip: "pipeline.source.host"
        snmp_version: "'3'"
    - type: unnest
      field: _labels
      drop_source: true
    - type: drop
      fields: [_index_parts]

  sinks:
    - type: sftp
      host: ${SNMP_WALK_SFTP_HOST:-sftp.example.com}
      port: ${SNMP_WALK_SFTP_PORT:-22}
      username: ${SNMP_WALK_SFTP_USER:-example_user}
      password: ${SNMP_WALK_SFTP_PASS:-changeme}
      remote_path: ${SNMP_WALK_SFTP_PATH:-/data/output/snmp_walk_v3/results/}
      filename_template: "{pipeline}_{timestamp}.json"
      serializer_out:
        type: json
        indent: 2

  on_error: continue
