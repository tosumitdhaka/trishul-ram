version: "1"

pipeline:
  name: snmp-walk-iftable
  description: "Walk ifTable on host SNMP agent, save each interface row as JSON to local file and SFTP"
  enabled: true

  # Run every 60 seconds; use POST /api/pipelines/snmp-walk-iftable/run to trigger manually
  schedule:
    type: interval
    interval_seconds: 60

  source:
    type: snmp_poll
    host: host.docker.internal   # reaches the WSL2 host's snmpd on 127.0.0.1
    port: 161
    community: public
    version: "2c"
    oids:
      - "1.3.6.1.2.1.2.2"       # ifTable — all interface entries
    operation: walk
    resolve_oids: true
    mib_modules:
      - IF-MIB
    yield_rows: true             # one pipeline record per interface row
    index_depth: 1               # last 1 OID component = ifIndex

  serializer_in:
    type: json

  transforms:
    - type: add_field
      fields:
        source_host: "'host.docker.internal'"
        collected_by: "'tram-snmp-walk'"

  serializer_out:
    type: json
    indent: 2

  sinks:
    - type: local
      path: /data/output
      filename_template: "iftable_{pipeline}_{timestamp}.json"

    - type: sftp
      host: sftp
      port: 22
      username: tram
      password: tram123
      remote_path: /upload
      filename_template: "iftable_{pipeline}_{timestamp}.json"
      retry_count: 2
      retry_delay_seconds: 3.0

  on_error: continue
