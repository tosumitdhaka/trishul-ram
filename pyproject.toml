[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tram"
version = "0.9.0"
description = "Trishul Real-time Adapter & Mapper — telecom data pipeline daemon"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
keywords = ["telecom", "data-pipeline", "sftp", "pm", "fm", "etl"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "typer[all]>=0.12",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "paramiko>=3.4",
    "simpleeval>=1.0",
    "defusedxml>=0.7",
    "lxml>=5.2",
    "apscheduler>=3.10",
    "rich>=13.7",
    "httpx>=0.27",
    "sqlalchemy>=2.0",
]

[project.optional-dependencies]
kafka = ["kafka-python>=2.0"]
opensearch = ["opensearch-py>=2.4"]
s3 = ["boto3>=1.35"]
snmp = ["pysnmp-lextudio>=6.2"]
avro = ["fastavro>=1.9"]
protobuf_ser = ["protobuf>=4.25", "grpcio-tools>=1.64"]
parquet = ["pyarrow>=16"]
msgpack_ser = ["msgpack>=1.0"]
mqtt = ["paho-mqtt>=2.0"]
amqp = ["pika>=1.0"]
nats = ["nats-py>=2.3"]
gnmi = ["pygnmi>=0.8"]
jmespath = ["jmespath>=1.0"]
sql = ["sqlalchemy>=2.0"]
postgresql = ["psycopg2-binary>=2.9"]
mysql = ["PyMySQL>=1.1"]
influxdb = ["influxdb-client>=3.0"]
redis = ["redis>=5.0"]
gcs = ["google-cloud-storage>=2.0"]
azure = ["azure-storage-blob>=12.0"]
websocket = ["websockets>=12.0"]
elasticsearch = ["elasticsearch>=8.0"]
metrics = ["prometheus-client>=0.20"]
prometheus_rw = ["protobuf>=4.25", "python-snappy>=0.7"]
corba = ["omniORBpy>=4.3"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "ruff>=0.4",
]
all = [
    "tram[kafka]",
    "tram[opensearch]",
    "tram[s3]",
    "tram[snmp]",
    "tram[avro]",
    "tram[protobuf_ser]",
    "tram[parquet]",
    "tram[msgpack_ser]",
    "tram[mqtt]",
    "tram[amqp]",
    "tram[nats]",
    "tram[gnmi]",
    "tram[jmespath]",
    "tram[sql]",
    "tram[influxdb]",
    "tram[redis]",
    "tram[gcs]",
    "tram[azure]",
    "tram[websocket]",
    "tram[elasticsearch]",
    "tram[metrics]",
    "tram[prometheus_rw]",
]

[project.scripts]
tram = "tram.cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["tram*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
log_cli = true
log_cli_level = "DEBUG"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]
