## TRAM Helm chart values — generic template
## Copy this file to values.yaml (or pass with -f) and adjust for your environment.
## Ref: https://github.com/trishul/tram

image:
  registry: ""               # e.g. ghcr.io
  repository: OWNER/tram     # replace OWNER with your registry namespace
  tag: "1.3.3"
  pullPolicy: IfNotPresent

## Standalone mode: single-replica StatefulSet (replicaCount=1).
## Manager+worker mode: set manager.enabled=true — standalone StatefulSet is skipped.
replicaCount: 1

## Manager + Worker mode.
## When enabled:
##   - A StatefulSet named <fullname>-manager is created (replicas: 1, port: 8765)
##   - A StatefulSet named <fullname>-worker is created (replicas: worker.replicas, port: 8766/8767)
##   - The standalone StatefulSet is skipped
manager:
  enabled: false
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    existingClaim: ""
  resources: {}
    # requests:
    #   cpu: 250m
    #   memory: 512Mi
    # limits:
    #   cpu: "1"
    #   memory: 1Gi

## Worker configuration (only used when manager.enabled=true)
worker:
  replicas: 3
  port: 8766
  ingressPort: 8767
  ingressService:
    enabled: true
    type: NodePort
    port: 8767
    nodePort: 30002
  resources: {}
    # requests:
    #   cpu: 250m
    #   memory: 512Mi
    # limits:
    #   cpu: "1"
    #   memory: 1Gi
  image:
    registry: ""
    repository: ""   # empty = fall back to .Values.image.repository
    tag: ""          # empty = fall back to .Values.image.tag

nameOverride: ""
fullnameOverride: ""

## Share the host network namespace with pods.
## Leave false for normal multi-replica clusters.
hostNetwork: false

service:
  type: ClusterIP
  port: 8765
  nodePort: null
  snmpTrapPorts: []

## Per-pod SQLite persistence (standalone mode only).
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

## Shared ReadWriteMany storage for schemas and MIBs.
sharedStorage:
  enabled: false
  size: 2Gi
  storageClass: ""

env:
  TRAM_LOG_LEVEL: INFO
  TRAM_LOG_FORMAT: json
  # TRAM_NODE_ID: ""
  # TRAM_SHUTDOWN_TIMEOUT_SECONDS: "30"
  # TRAM_DB_URL: ""
  # TRAM_SMTP_HOST: localhost
  # TRAM_SMTP_PORT: "587"
  # TRAM_SMTP_TLS: "true"
  # TRAM_SMTP_FROM: tram@localhost
  # TRAM_RATE_LIMIT: "0"
  # TRAM_RATE_LIMIT_WINDOW: "60"
  # TRAM_AUTH_SECRET: ""
  # TRAM_OTEL_ENDPOINT: ""
  # TRAM_OTEL_SERVICE: tram
  # TRAM_WATCH_PIPELINES: "false"
  # TRAM_PIPELINE_SYNC_INTERVAL: "30"

envSecret:
  TRAM_AUTH_SECRET:
    secretName: tram-auth
    secretKey: authSecret

schemaRegistry:
  url: ""
  username: ""
  password: ""

## Pipeline YAML files to mount as a ConfigMap at /pipelines.
## The chart already includes a built-in sample-health.yaml bootstrap pipeline.
## Add extra pipeline YAMLs here if needed.
pipelines: {}

## Standalone pod resources.
resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8765"
  # prometheus.io/path: "/metrics"

serviceAccount:
  create: true
  name: ""

ui:
  enabled: true

apiKey: ""
authUsers: ""

securityContext:
  fsGroup: 1000
  # runAsUser: 1000
  # runAsGroup: 1000

keys:
  secretName: ""
  mountPath: /secrets

tls:
  enabled: false
  secretName: ""
  certManagerIssuer: ""

postgresql:
  enabled: false
  auth:
    username: tram
    password: tram
    database: tram
  primary:
    persistence:
      enabled: true
      size: 5Gi

extraLabels: {}
