{{- /*
Auto-generate the tram-auth secret on install and upgrade.

Runs as a pre-install / pre-upgrade hook so Helm does NOT check ownership
labels on the existing secret — this avoids the "cannot be imported into
the current release" error when the secret was created manually before this
chart version was deployed.

Behaviour:
  - If the secret already exists:  preserve its current authSecret value
    (lookup reads it so the rendered manifest is identical → no-op apply).
  - If the secret does not exist:  generate a random 64-char key.

hook-delete-policy: hook-failed — the secret is never deleted on success,
only cleaned up if the hook itself errors out.

Skip auto-creation when the user points TRAM_AUTH_SECRET at a different
secret via envSecret (secretName != "tram-auth").
*/}}
{{- $targetSecret := "tram-auth" }}
{{- $authSecretRef := index .Values.envSecret "TRAM_AUTH_SECRET" | default dict }}
{{- $managedByUs := or (not $authSecretRef) (eq ($authSecretRef.secretName | default "") $targetSecret) }}
{{- if $managedByUs }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $targetSecret }}
{{- if not $existing }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $targetSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: hook-failed
    helm.sh/hook-weight: "-10"
type: Opaque
data:
  authSecret: {{ randAlphaNum 64 | b64enc | quote }}
{{- end }}
{{- end }}
