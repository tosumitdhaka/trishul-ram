{{- /*
Auto-generate the tram-auth secret if it does not already exist.
Uses lookup so the value is stable across `helm upgrade` — the secret is
only written on first install; existing secrets are left untouched.

TRAM_AUTH_SECRET is the shared HMAC signing key for browser session tokens.
In cluster mode (multiple replicas) all pods must share the same secret so
that a token issued by tram-0 is accepted by tram-1/tram-2.

Skip auto-creation when the user has wired TRAM_AUTH_SECRET to a different
secret via envSecret (secretName != "tram-auth").
*/}}
{{- $targetSecret := "tram-auth" }}
{{- $authSecretRef := index .Values.envSecret "TRAM_AUTH_SECRET" | default dict }}
{{- $managedByUs := or (not $authSecretRef) (eq ($authSecretRef.secretName | default "") $targetSecret) }}
{{- if $managedByUs }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $targetSecret }}
{{- $authSecretValue := "" }}
{{- if $existing }}
{{- $authSecretValue = index $existing.data "authSecret" | b64dec }}
{{- else }}
{{- $authSecretValue = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $targetSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  authSecret: {{ $authSecretValue | b64enc | quote }}
{{- end }}
