{{- if not .Values.manager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tram.fullname" . }}-headless
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "tram.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
