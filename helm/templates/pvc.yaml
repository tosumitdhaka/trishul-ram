{{- if .Values.sharedStorage.enabled }}
## Shared ReadWriteMany PVC.
##
## Standalone mode: mounted on every replica so all pods see the same schemas/MIBs.
## Manager+worker mode: mounted on manager (for writing) and workers (for reading)
##   when workers need to access schemas/MIBs at pipeline execution time.
##   The manager SQLite database lives on the manager.persistence RWO PVC instead.
##
## Requires a StorageClass that supports ReadWriteMany (e.g. nfs-rwx, efs-sc, azurefile).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-{{ include "tram.fullname" . }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.sharedStorage.size }}
  {{- if .Values.sharedStorage.storageClass }}
  storageClassName: {{ .Values.sharedStorage.storageClass | quote }}
  {{- end }}
{{- end }}
