apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tram.fullname" . }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "tram.fullname" . }}-headless
  ## OrderedReady ensures tram-0 completes DB schema migration before tram-1 starts,
  ## preventing ALTER TABLE deadlocks when multiple pods race on first-run migrations.
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      {{- include "tram.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.pipelines }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "tram.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tram.serviceAccountName" . }}
      enableServiceLinks: false
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      securityContext:
        ## fsGroup ensures Secret volumes are group-owned by the tram gid (1000),
        ## so key files (defaultMode 0440) are readable by the tram user.
        fsGroup: {{ .Values.securityContext.fsGroup | default 1000 }}
        {{- with .Values.securityContext.runAsUser }}
        runAsUser: {{ . }}
        {{- end }}
        {{- with .Values.securityContext.runAsGroup }}
        runAsGroup: {{ . }}
        {{- end }}
      containers:
        - name: tram
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tram", "daemon"]
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
            {{- range .Values.service.snmpTrapPorts }}
            - name: snmp-trap-{{ . }}
              containerPort: {{ . }}
              protocol: UDP
            {{- end }}
          env:
            ## Always inject stable pod name as node identity (e.g. tram-0, tram-1)
            - name: TRAM_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.clusterMode.enabled }}
            - name: TRAM_CLUSTER_ENABLED
              value: "true"
            {{- end }}
            {{- if gt (len .Values.pipelines) 0 }}
            - name: TRAM_PIPELINE_DIR
              value: /pipelines
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            ## Auto-wired from Bitnami PostgreSQL subchart.
            ## Uses .Release.Name (not tram.fullname) so nameOverride/fullnameOverride
            ## can shorten TRAM pod names without breaking the DB connection.
            - name: TRAM_DB_URL
              value: "postgresql+psycopg2://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql/{{ .Values.postgresql.auth.database }}"
            {{- else if .Values.persistence.enabled }}
            ## SQLAlchemy URL for SQLite on the /data PVC (v1.0.3+; replaces TRAM_DB_PATH)
            - name: TRAM_DB_URL
              value: "sqlite:////data/tram.db"
            {{- end }}
            {{- if or .Values.sharedStorage.enabled .Values.persistence.enabled }}
            ## Schemas and MIBs live on /data — either the shared RWX PVC (cluster) or
            ## the per-pod RWO PVC (standalone). Path is the same in both cases (v1.0.9).
            - name: TRAM_SCHEMA_DIR
              value: /data/schemas
            - name: TRAM_MIB_DIR
              value: /data/mibs
            {{- end }}
            {{- if .Values.schemaRegistry.url }}
            - name: TRAM_SCHEMA_REGISTRY_URL
              value: {{ .Values.schemaRegistry.url | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.username }}
            - name: TRAM_SCHEMA_REGISTRY_USERNAME
              value: {{ .Values.schemaRegistry.username | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.password }}
            - name: TRAM_SCHEMA_REGISTRY_PASSWORD
              value: {{ .Values.schemaRegistry.password | quote }}
            {{- end }}
            {{- range $key, $ref := .Values.envSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName }}
                  key: {{ $ref.secretKey }}
            {{- end }}
            {{- if .Values.apiKey }}
            - name: TRAM_API_KEY
              value: {{ .Values.apiKey | quote }}
            {{- end }}
            {{- if .Values.authUsers }}
            - name: TRAM_AUTH_USERS
              value: {{ .Values.authUsers | quote }}
            {{- end }}
            {{- if not .Values.ui.enabled }}
            ## Disable UI static serving when ui.enabled=false
            - name: TRAM_UI_DIR
              value: ""
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: TRAM_TLS_CERTFILE
              value: /tls/tls.crt
            - name: TRAM_TLS_KEYFILE
              value: /tls/tls.key
            {{- end }}
          volumeMounts:
            {{- if gt (len .Values.pipelines) 0 }}
            - name: pipelines
              mountPath: /pipelines
              readOnly: true
            {{- end }}
            {{- if or .Values.persistence.enabled .Values.sharedStorage.enabled }}
            ## /data is backed by the shared RWX PVC (cluster) or per-pod RWO PVC (standalone)
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.keys.secretName }}
            ## Pre-mounted connector key files — see values.yaml keys section
            - name: keys
              mountPath: {{ .Values.keys.mountPath | default "/secrets" }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if gt (len .Values.pipelines) 0 }}
        - name: pipelines
          configMap:
            name: {{ include "tram.fullname" . }}-pipelines
        {{- end }}
        {{- if .Values.sharedStorage.enabled }}
        ## Shared RWX PVC — same volume name "data" as the per-pod RWO case so
        ## TRAM_SCHEMA_DIR/TRAM_MIB_DIR (/data/*) work identically in both modes.
        - name: data
          persistentVolumeClaim:
            claimName: data-{{ include "tram.fullname" . }}
        {{- end }}
        {{- if .Values.keys.secretName }}
        ## Connector key files — rotated zero-restart via kubectl apply on the Secret.
        ## 0440 + fsGroup:1000 → root:tram ownership, tram user can read, not world-readable.
        - name: keys
          secret:
            secretName: {{ .Values.keys.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.sharedStorage.enabled) }}
  ## Per-pod RWO PVC (standalone mode). Skipped when sharedStorage.enabled=true — the
  ## shared RWX PVC is injected as a regular volume above instead.
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "tram.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
