apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tram.fullname" . }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "tram.fullname" . }}-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "tram.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.pipelines }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "tram.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tram.serviceAccountName" . }}
      enableServiceLinks: false
      containers:
        - name: tram
          image: "{{ if .Values.image.registry }}{{ .Values.image.registry }}/{{ end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tram", "daemon"]
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
            {{- range .Values.service.snmpTrapPorts }}
            - name: snmp-trap-{{ . }}
              containerPort: {{ . }}
              protocol: UDP
            {{- end }}
          env:
            ## Always inject stable pod name as node identity (e.g. tram-0, tram-1)
            - name: TRAM_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.clusterMode.enabled }}
            - name: TRAM_CLUSTER_ENABLED
              value: "true"
            {{- end }}
            {{- if gt (len .Values.pipelines) 0 }}
            - name: TRAM_PIPELINE_DIR
              value: /pipelines
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            ## SQLAlchemy URL for SQLite on the /data PVC (v1.0.3+; replaces TRAM_DB_PATH)
            - name: TRAM_DB_URL
              value: "sqlite:////data/tram.db"
            ## Store schemas and MIBs under the same /data PVC — no extra volumes needed.
            ## Standard MIBs baked into /mibs (image layer) are still searched by SNMP connectors.
            - name: TRAM_SCHEMA_DIR
              value: /data/schemas
            - name: TRAM_MIB_DIR
              value: /data/mibs
            {{- end }}
            {{- if .Values.schemaRegistry.url }}
            - name: TRAM_SCHEMA_REGISTRY_URL
              value: {{ .Values.schemaRegistry.url | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.username }}
            - name: TRAM_SCHEMA_REGISTRY_USERNAME
              value: {{ .Values.schemaRegistry.username | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.password }}
            - name: TRAM_SCHEMA_REGISTRY_PASSWORD
              value: {{ .Values.schemaRegistry.password | quote }}
            {{- end }}
            {{- range $key, $ref := .Values.envSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName }}
                  key: {{ $ref.secretKey }}
            {{- end }}
            {{- if .Values.apiKey }}
            - name: TRAM_API_KEY
              value: {{ .Values.apiKey | quote }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: TRAM_TLS_CERTFILE
              value: /tls/tls.crt
            - name: TRAM_TLS_KEYFILE
              value: /tls/tls.key
            {{- end }}
          volumeMounts:
            {{- if gt (len .Values.pipelines) 0 }}
            - name: pipelines
              mountPath: /pipelines
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if gt (len .Values.pipelines) 0 }}
        - name: pipelines
          configMap:
            name: {{ include "tram.fullname" . }}-pipelines
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "tram.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
