{{- if .Values.manager.enabled }}
## Manager StatefulSet (v1.2.0 manager+worker mode)
## Owns all scheduling state. Dispatches pipeline runs to worker pods.
## Created only when manager.enabled=true; the standalone StatefulSet is skipped.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tram.fullname" . }}-manager
  labels:
    {{- include "tram.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  serviceName: {{ include "tram.fullname" . }}-manager
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "tram.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: manager
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.pipelines }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "tram.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: {{ include "tram.serviceAccountName" . }}
      enableServiceLinks: false
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      securityContext:
        fsGroup: {{ .Values.securityContext.fsGroup | default 1000 }}
        {{- with .Values.securityContext.runAsUser }}
        runAsUser: {{ . }}
        {{- end }}
        {{- with .Values.securityContext.runAsGroup }}
        runAsGroup: {{ . }}
        {{- end }}
      {{- if .Values.postgresql.enabled }}
      ## Wait for PostgreSQL to accept connections before the manager starts.
      ## Prevents the "Could not initialise TramDB: connection refused" race on fresh installs.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ .Release.Name }}-postgresql:5432 ..."
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "PostgreSQL not ready — sleeping 3s"
                sleep 3
              done
              echo "PostgreSQL is up — starting manager"
      {{- end }}
      containers:
        - name: tram
          image: "{{ include "tram.managerImage" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tram", "daemon"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: TRAM_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            ## Manager mode: own all scheduling, dispatch runs to workers
            - name: TRAM_MODE
              value: "manager"
            ## Point manager at its own service so workers can reach the callback URL
            - name: TRAM_MANAGER_URL
              value: "http://{{ include "tram.fullname" . }}:{{ .Values.service.port }}"
            ## Worker discovery via K8s headless DNS (tram-worker-0.tram-worker.<ns>.svc…)
            - name: TRAM_WORKER_REPLICAS
              value: {{ .Values.worker.replicas | quote }}
            - name: TRAM_WORKER_SERVICE
              value: "{{ include "tram.fullname" . }}-worker"
            - name: TRAM_WORKER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TRAM_WORKER_PORT
              value: {{ .Values.worker.port | quote }}
            {{- if gt (len .Values.pipelines) 0 }}
            - name: TRAM_PIPELINE_DIR
              value: /pipelines
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: TRAM_DB_URL
              value: "postgresql+psycopg2://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql/{{ .Values.postgresql.auth.database }}"
            {{- else if .Values.manager.persistence.enabled }}
            ## SQLite on the manager RWO PVC — no external database required.
            - name: TRAM_DB_URL
              value: "sqlite:////data/tram.db"
            {{- end }}
            {{- if .Values.manager.persistence.enabled }}
            ## Schemas and MIBs on manager RWO PVC (/data).
            - name: TRAM_SCHEMA_DIR
              value: /data/schemas
            - name: TRAM_MIB_DIR
              value: /data/mibs
            {{- else if .Values.sharedStorage.enabled }}
            ## Shared RWX PVC covers schemas/MIBs when manager.persistence is disabled.
            - name: TRAM_SCHEMA_DIR
              value: /data/schemas
            - name: TRAM_MIB_DIR
              value: /data/mibs
            {{- end }}
            {{- if .Values.schemaRegistry.url }}
            - name: TRAM_SCHEMA_REGISTRY_URL
              value: {{ .Values.schemaRegistry.url | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.username }}
            - name: TRAM_SCHEMA_REGISTRY_USERNAME
              value: {{ .Values.schemaRegistry.username | quote }}
            {{- end }}
            {{- if .Values.schemaRegistry.password }}
            - name: TRAM_SCHEMA_REGISTRY_PASSWORD
              value: {{ .Values.schemaRegistry.password | quote }}
            {{- end }}
            {{- range $key, $ref := .Values.envSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName }}
                  key: {{ $ref.secretKey }}
            {{- end }}
            {{- if .Values.apiKey }}
            - name: TRAM_API_KEY
              value: {{ .Values.apiKey | quote }}
            {{- end }}
            {{- if .Values.authUsers }}
            - name: TRAM_AUTH_USERS
              value: {{ .Values.authUsers | quote }}
            {{- end }}
            {{- if not .Values.ui.enabled }}
            - name: TRAM_UI_DIR
              value: ""
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: TRAM_TLS_CERTFILE
              value: /tls/tls.crt
            - name: TRAM_TLS_KEYFILE
              value: /tls/tls.key
            {{- end }}
          volumeMounts:
            {{- if gt (len .Values.pipelines) 0 }}
            - name: pipelines
              mountPath: /pipelines
              readOnly: true
            {{- end }}
            {{- if .Values.manager.persistence.enabled }}
            ## RWO PVC — SQLite DB + schemas + MIBs
            - name: manager-data
              mountPath: /data
            {{- else if .Values.sharedStorage.enabled }}
            ## RWX PVC — schemas + MIBs (no per-manager DB PVC)
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.keys.secretName }}
            - name: keys
              mountPath: {{ .Values.keys.mountPath | default "/secrets" }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.manager.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- else }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
      volumes:
        {{- if gt (len .Values.pipelines) 0 }}
        - name: pipelines
          configMap:
            name: {{ include "tram.fullname" . }}-pipelines
        {{- end }}
        {{- if and .Values.manager.persistence.enabled .Values.manager.persistence.existingClaim }}
        - name: manager-data
          persistentVolumeClaim:
            claimName: {{ .Values.manager.persistence.existingClaim }}
        {{- else if .Values.sharedStorage.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: data-{{ include "tram.fullname" . }}
        {{- end }}
        {{- if .Values.keys.secretName }}
        - name: keys
          secret:
            secretName: {{ .Values.keys.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.manager.persistence.enabled (not .Values.manager.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: manager-data
        labels:
          {{- include "tram.labels" . | nindent 10 }}
          app.kubernetes.io/component: manager
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.manager.persistence.size | default "10Gi" }}
        {{- with .Values.manager.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
{{- end }}
