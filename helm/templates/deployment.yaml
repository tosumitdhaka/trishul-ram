{{- if not .Values.clusterMode.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tram.fullname" . }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tram.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tram.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "tram.serviceAccountName" . }}
      enableServiceLinks: false
      containers:
        - name: tram
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["tram", "daemon"]
          ports:
            - name: http
              containerPort: 8765
              protocol: TCP
          env:
            {{- if gt (len .Values.pipelines) 0 }}
            - name: TRAM_PIPELINE_DIR
              value: /pipelines
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: TRAM_DB_PATH
              value: /data/tram.db
            {{- end }}
            {{- range $key, $ref := .Values.envSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName }}
                  key: {{ $ref.secretKey }}
            {{- end }}
          volumeMounts:
            {{- if gt (len .Values.pipelines) 0 }}
            - name: pipelines
              mountPath: /pipelines
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if gt (len .Values.pipelines) 0 }}
        - name: pipelines
          configMap:
            name: {{ include "tram.fullname" . }}-pipelines
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tram.fullname" . }}-data
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
