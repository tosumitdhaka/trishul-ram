apiVersion: v1
kind: Service
metadata:
  name: {{ include "tram.fullname" . }}
  labels:
    {{- include "tram.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- range .Values.service.snmpTrapPorts }}
    ## UDP port for snmp_trap source connector (matches pipeline port:)
    - port: {{ . }}
      targetPort: {{ . }}
      protocol: UDP
      name: snmp-trap-{{ . }}
    {{- end }}
  selector:
    {{- include "tram.selectorLabels" . | nindent 4 }}
