## TRAM Helm chart values
## Ref: https://github.com/trishul/tram

image:
  repository: ghcr.io/OWNER/tram
  tag: "0.6.0"
  pullPolicy: IfNotPresent

## Standalone mode: replicaCount=1 (default).
## Cluster mode: set clusterMode.enabled=true, replicaCount>1, and TRAM_DB_URL.
replicaCount: 1

## Cluster mode (v0.8.0)
## Requires an external DB (PostgreSQL recommended, MariaDB supported).
## When enabled, a StatefulSet is deployed instead of a Deployment.
clusterMode:
  enabled: false

service:
  type: ClusterIP
  port: 8765

## SQLite persistence for run history, pipeline versions, and alert state
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

## Environment variables (plain key/value)
env:
  TRAM_LOG_LEVEL: INFO
  TRAM_LOG_FORMAT: json
  # TRAM_NODE_ID: ""            # defaults to hostname (auto-set from pod name in StatefulSet)
  # TRAM_SHUTDOWN_TIMEOUT_SECONDS: "30"  # drain timeout before forced stop
  # --- Cluster (v0.8.0) ---
  # TRAM_CLUSTER_ENABLED: "true"         # enable when clusterMode.enabled=true
  # TRAM_HEARTBEAT_SECONDS: "10"
  # TRAM_NODE_TTL_SECONDS: "30"
  # --- Database (v0.7.0) ---
  # TRAM_DB_URL: ""             # Required for cluster mode (PostgreSQL or MariaDB)
  #                             # SQLite:     sqlite:////data/tram.db
  #                             # PostgreSQL: postgresql+psycopg2://user:pass@host/db
  #                             # MySQL:      mysql+pymysql://user:pass@host/db
  # --- SMTP (for alert email actions) ---
  # TRAM_SMTP_HOST: localhost
  # TRAM_SMTP_PORT: "587"
  # TRAM_SMTP_TLS: "true"
  # TRAM_SMTP_FROM: tram@localhost

## Environment variables sourced from a Kubernetes Secret
## Example:
##   envSecret:
##     TRAM_SMTP_USER:
##       secretName: tram-smtp
##       secretKey: username
##     TRAM_SMTP_PASS:
##       secretName: tram-smtp
##       secretKey: password
envSecret: {}

## Pipeline YAML files to mount as a ConfigMap at /pipelines
## Example:
##   pipelines:
##     minimal.yaml: |
##       pipeline:
##         name: minimal
##         ...
pipelines: {}

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

## Pod annotations (e.g., for Prometheus scraping)
podAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8765"
  # prometheus.io/path: "/metrics"

serviceAccount:
  create: true
  ## If not set, a name is generated using the fullname template
  name: ""

## Extra labels to add to all resources
extraLabels: {}
