## TRAM Helm chart values
## This file tracks the active kind/dev deployment profile for this repo.
## Use helm/values-template.yaml as the generic release baseline.
## Ref: https://github.com/trishul/tram

image:
  registry:   ""              # e.g. ghcr.io — empty = no registry prefix (local/kind images)
  repository: trishul-ram      # image name without registry
  tag: "local-20260420-v131"
  pullPolicy: IfNotPresent

## Standalone mode: single-replica StatefulSet (replicaCount=1).
## Manager+worker mode: set manager.enabled=true — standalone StatefulSet is skipped.
replicaCount: 1

## Manager + Worker mode (v1.2.0)
## Replaces the old equal-peers cluster model with a dedicated manager StatefulSet
## and a worker StatefulSet.  Set manager.enabled=true to switch modes.
##
## When enabled:
##   - A StatefulSet named <fullname>-manager is created (replicas: 1, port: 8765)
##   - A StatefulSet named <fullname>-worker is created (replicas: worker.replicas, port: 8766)
##   - A headless Service <fullname>-manager is created for stable manager DNS
##   - A headless Service <fullname>-worker is created for stable worker DNS
##   - The standalone StatefulSet is NOT created
##
## Migration:
##   helm upgrade trishul-ram ./helm --set manager.enabled=true --set worker.replicas=3
manager:
  enabled: true   # kind profile runs dedicated manager + workers

  ## Manager-only RWO persistence (v1.2.0).
  ## Creates a single ReadWriteOnce PVC mounted at /data on the manager StatefulSet.
  ## Holds the SQLite database, uploaded schemas, and downloaded MIBs.
  ## Because only one manager pod ever writes to this volume, RWO is sufficient —
  ## no NFS or RWX StorageClass required.
  ##
  ## When enabled and postgresql.enabled=false, TRAM_DB_URL is automatically set
  ## to sqlite:////data/tram.db so no external database is needed.
  ##
  ## Workers: schemas/MIBs are manager-side only by default. If workers execute
  ## Avro, Protobuf, or SNMP pipelines that reference /data/schemas or /data/mibs,
  ## also enable sharedStorage (RWX) so workers can read those files.
  persistence:
    enabled: true         # recommended when manager.enabled=true
    size: 10Gi
    storageClass: ""      # leave empty for cluster default StorageClass
    accessMode: ReadWriteOnce
    ## Upgrading from v1.2.x? Set this to your existing PVC name to reuse it.
    ## Example: manager-data-trishul-ram
    ## When set, volumeClaimTemplates is skipped and this PVC is mounted directly.
    existingClaim: "manager-data-trishul-ram-manager-0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

## Worker configuration (only used when manager.enabled=true)
worker:
  replicas: 3
  port: 8766
  ingressPort: 8767
  ingressService:
    enabled: true
    type: NodePort
    port: 8767
    nodePort: 30002
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  ## Override the container image for worker pods.
  ## When not set (default), workers use the same image as the manager (.Values.image).
  ## Set repository to use a dedicated worker image (built from Dockerfile.worker):
  ##   image:
  ##     registry: ghcr.io
  ##     repository: trishul/trishul-ram-worker
  ##     tag: "1.3.1"
  image:
    registry: ""
    repository: trishul-ram-worker
    tag: "local-20260420-v131"

## App name prefix for all K8s resource names.
## Defaults to the chart name (trishul-ram).
## Override to shorten or rename — e.g. nameOverride: "tram" gives back short names like tram-0.
nameOverride: ""
fullnameOverride: ""

## Share the host (kind-node) network namespace with pods.
## Required when pods need to reach services on the WSL2 host (e.g. SNMP via UDP)
## because the CNI overlay NAT drops UDP return packets through the Docker bridge.
## With hostNetwork=true pods bypass CNI and can reach 127.0.0.1 / host IP directly.
## Caveat: all pod ports occupy the host port space — only one TRAM replica per kind node.
hostNetwork: false

service:
  type: NodePort
  port: 8765
  nodePort: 30001   # kind cluster exposes 30001 → host :30001; set null for ClusterIP
  ## List of UDP ports to expose for snmp_trap source connectors.
  ## Each entry creates one UDP Service port and one containerPort.
  ## Must match the port: values in your snmp_trap pipeline YAMLs.
  ## Each port addition requires a `helm upgrade` to take effect.
  ## Example: [1162, 1163, 1164]
  snmpTrapPorts: []

## Per-pod SQLite persistence (standalone mode only).
## When enabled, a PVC is created per pod via volumeClaimTemplates and mounted at /data.
## TRAM_DB_URL (sqlite:////data/tram.db) is auto-set when postgresql.enabled=false.
## Not used in manager+worker mode — use manager.persistence instead.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

## Shared ReadWriteMany storage for schemas and MIBs (v1.0.9).
##
## Standalone mode: mounted on every replica so schemas/MIBs uploaded via the UI
##   are visible to all pods immediately.
##
## Manager+worker mode: manager writes schemas/MIBs to manager.persistence (RWO).
##   Enable sharedStorage ONLY if workers also need to read those files at runtime
##   (e.g. Avro/Protobuf pipelines that reference /data/schemas, SNMP pipelines
##   that need custom MIBs at /data/mibs). When enabled in manager mode, the RWX
##   PVC is mounted on BOTH the manager and workers at /data/schemas and /data/mibs.
##   The manager.persistence RWO PVC still handles the SQLite database.
##
## Requires a StorageClass that supports ReadWriteMany:
##   kind:       storageClass: "nfs-rwx"  (deploy helm/kind/nfs-provisioner.yaml first)
##   AWS EKS:    storageClass: "efs-sc"
##   Azure AKS:  storageClass: "azurefile"
##   GKE:        storageClass: "filestore-rwx"
##   Longhorn:   storageClass: "longhorn-rwx"
sharedStorage:
  enabled: false
  size: 2Gi
  storageClass: "nfs-rwx"

## Environment variables (plain key/value)
env:
  TRAM_LOG_LEVEL: INFO
  TRAM_LOG_FORMAT: json
  # TRAM_NODE_ID: ""            # defaults to hostname (auto-set from pod name in StatefulSet)
  # TRAM_SHUTDOWN_TIMEOUT_SECONDS: "30"  # drain timeout before forced stop
  # --- Database (v0.7.0) ---
  # TRAM_DB_URL: ""             # Required for cluster mode (PostgreSQL or MariaDB)
  #                             # SQLite:     sqlite:////data/tram.db
  #                             # PostgreSQL: postgresql+psycopg2://user:pass@host/db
  #                             # MySQL:      mysql+pymysql://user:pass@host/db
  # --- SMTP (for alert email actions) ---
  # TRAM_SMTP_HOST: localhost
  # TRAM_SMTP_PORT: "587"
  # TRAM_SMTP_TLS: "true"
  # TRAM_SMTP_FROM: tram@localhost
  # --- Security (v1.0.0) ---
  # Note: API key is preferably set via .Values.apiKey (injected as TRAM_API_KEY automatically)
  # or via envSecret to avoid storing secrets in values.yaml.
  # TRAM_RATE_LIMIT: "0"          # requests/minute per client IP; 0 = disabled
  # --- Browser auth (v1.0.8) ---
  # TRAM_AUTH_SECRET: ""          # Shared HMAC signing secret for session tokens.
  #                               # REQUIRED in cluster mode — without it each pod
  #                               # uses its own random secret and tokens from one
  #                               # pod are rejected by others.
  #                               # Generate: python3 -c "import secrets; print(secrets.token_hex(32))"
  #                               # Prefer envSecret.TRAM_AUTH_SECRET for production.
  # TRAM_RATE_LIMIT_WINDOW: "60"  # sliding window in seconds
  # --- Observability (v1.0.0) ---
  # TRAM_OTEL_ENDPOINT: ""        # OTLP gRPC endpoint, e.g. http://otel-collector:4317
  # TRAM_OTEL_SERVICE: tram       # OpenTelemetry service.name attribute
  # --- Operations (v1.0.0) ---
  # TRAM_WATCH_PIPELINES: "false" # hot-reload pipelines on YAML change (requires tram[watch])
  # --- SNMP MIBs / Schemas (v1.0.3) ---
  # TRAM_MIB_DIR and TRAM_SCHEMA_DIR are auto-set to /data/mibs and /data/schemas when
  # persistence.enabled=true. Override here only if you need a custom location.
  # --- Pipeline DB sync (v1.1.2) ---
  # TRAM_PIPELINE_SYNC_INTERVAL: "30"  # seconds between DB polls for new/deleted pipelines
  # --- Schema Registry (v1.0.4) ---
  # Prefer using .Values.schemaRegistry below — it injects these vars automatically.

## Environment variables sourced from a Kubernetes Secret
## Use this for sensitive values (API keys, passwords) instead of plain env above.
## Example:
##   envSecret:
##     TRAM_API_KEY:
##       secretName: tram-secrets
##       secretKey: apiKey
##     TRAM_SMTP_USER:
##       secretName: tram-smtp
##       secretKey: username
##     TRAM_SMTP_PASS:
##       secretName: tram-smtp
##       secretKey: password
envSecret:
  TRAM_AUTH_SECRET:
    secretName: tram-auth
    secretKey: authSecret

## External schema registry (v1.0.4)
## When url is set, TRAM_SCHEMA_REGISTRY_URL is injected automatically, enabling:
##   - /api/schemas/registry/* reverse proxy (for UI tools using a single origin)
##   - Avro and Protobuf serializers use this URL as the default registry client
##     (no need to repeat schema_registry_url: in every pipeline YAML)
## For sensitive credentials prefer envSecret instead of setting username/password here.
schemaRegistry:
  url: ""          # e.g. http://schema-registry:8081
  username: ""     # optional basic-auth username
  password: ""     # optional basic-auth password (use envSecret for production)

## Pipeline YAML files to mount as a ConfigMap at /pipelines
## Add your own pipeline YAMLs here or via --set-file during helm install/upgrade.
## The sample pipeline below runs every 60 s and writes a health record to /tmp — safe to delete.
pipelines:
  sample-health.yaml: |
    version: "1"
    pipeline:
      name: sample-health
      schedule:
        type: interval
        interval_seconds: 600
      source:
        type: local
        path: /dev/null
        file_pattern: "*.noop"
      serializer_in:
        type: json
      transforms:
        - type: add_field
          fields:
            status: ok
            source: tram-sample
      sink:
        type: local
        path: /tmp/tram-sample

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

## Pod annotations (e.g., for Prometheus scraping)
podAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8765"
  # prometheus.io/path: "/metrics"

serviceAccount:
  create: true
  ## If not set, a name is generated using the fullname template
  name: ""

## Web UI (v1.0.7)
## The tram-ui static assets are baked into the image at /ui and served at /ui
## by the main service on port 8765.  Set ui.enabled=false to disable static
## serving without rebuilding the image (sets TRAM_UI_DIR="" in the pod).
ui:
  enabled: true

## API key authentication (v1.0.0)
## Set apiKey to enable X-API-Key authentication on /api/* endpoints.
## Health probes (/api/health, /api/ready), webhooks (/webhooks/), and the
## web UI (/ui) are always exempt from API key checks.
apiKey: "tram-internal-2026"   # Also configurable via TRAM_API_KEY env var

## Browser user authentication (v1.0.8)
## Comma-separated list of username:password pairs for UI login.
## When set, the UI shows a login screen and issues 8-hour session tokens.
## Coexists with apiKey — machine clients use X-API-Key, browser users log in.
## Use envSecret.TRAM_AUTH_USERS for production to avoid plaintext passwords.
## Example: authUsers: "admin:secret,viewer:readonly"
authUsers: "admin:tram@2026"

## Pod security context
## fsGroup ensures Secret-mounted volumes (keys) are group-owned by the tram gid
## so key files are readable by the tram process without being world-readable.
securityContext:
  fsGroup: 1000    # matches tram user gid (uid=gid=1000, set in Dockerfile)
  # runAsUser: 1000
  # runAsGroup: 1000

## Private key files for connectors (SFTP, gNMI client certs, etc.)
##
## Pre-mounts a single Kubernetes Secret at /secrets/ on every pod.
## Files in the Secret appear as /secrets/<filename> inside the container.
## Updating Secret contents propagates automatically via kubelet (~60s) — no pod restart needed.
## Adding an entirely new Secret mount (changing secretName) does require a rolling restart.
##
## Quickstart:
##   # Create (or update) the Secret — zero-restart rotation once the mount exists:
##   kubectl create secret generic tram-keys \
##     --from-file=sftp-prod.pem=./id_rsa_prod \
##     --from-file=sftp-dr.pem=./id_rsa_dr \
##     --dry-run=client -o yaml | kubectl apply -f -
##
##   # Enable the mount in values.yaml:
##   keys:
##     secretName: tram-keys
##
##   # Reference path in pipeline YAML:
##   source:
##     type: sftp
##     private_key_path: /secrets/sftp-prod.pem
##
## Placeholder Secret (mount enabled but initially empty):
##   kubectl create secret generic tram-keys --from-literal=.keep=""
keys:
  secretName: ""           # e.g. "tram-keys" — empty ("") disables the mount entirely (default)
  mountPath: /secrets      # path inside the container where key files appear

## TLS configuration (v1.0.0)
## Mount a Kubernetes TLS secret and enable TLS for the uvicorn server.
## Create the secret with: kubectl create secret tls tram-tls --cert=tls.crt --key=tls.key
tls:
  enabled: false
  secretName: ""           # Name of a Kubernetes TLS secret (tls.crt / tls.key)
  certManagerIssuer: ""    # Optional: cert-manager ClusterIssuer name for automatic issuance

## PostgreSQL subchart (v1.0.8)
## When enabled, deploys a Bitnami PostgreSQL instance and wires TRAM_DB_URL
## automatically into TRAM pods.
##
## Standalone mode:  optional — SQLite (persistence.enabled=true) is simpler for
##                   single-node deployments.
##
## Manager+worker mode (v1.2.0): PostgreSQL is now OPTIONAL.
##   The manager is the only DB writer, so SQLite on a RWO PVC works correctly.
##   Enable PostgreSQL when you need:
##     - External tooling that queries the run-history DB directly
##     - A managed cloud database (set TRAM_DB_URL via envSecret instead)
##     - Future HA manager failover support
##   For most deployments: postgresql.enabled=false + manager.persistence.enabled=true
##   is the recommended setup — no external database dependency.
##
## For production with an existing external PostgreSQL:
##   postgresql.enabled: false
##   envSecret:
##     TRAM_DB_URL:
##       secretName: tram-secrets
##       secretKey: dbUrl
postgresql:
  enabled: false
  auth:
    username: tram
    password: tram
    database: tram
  primary:
    persistence:
      enabled: true
      size: 5Gi

## Extra labels to add to all resources
extraLabels: {}
