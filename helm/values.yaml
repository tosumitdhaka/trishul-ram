## TRAM Helm chart values
## Ref: https://github.com/trishul/tram

image:
  repository: ghcr.io/OWNER/tram
  tag: "1.0.6"
  pullPolicy: IfNotPresent

## TRAM always deploys as a StatefulSet (stable pod names: tram-0, tram-1, …).
## replicaCount=1 → standalone daemon.
## replicaCount>1 + clusterMode.enabled=true → self-organizing cluster.
replicaCount: 1

## Cluster mode (v0.8.0)
## Activates consistent-hashing pipeline ownership across replicas.
## Requires an external DB (TRAM_DB_URL) — PostgreSQL recommended, MariaDB supported.
## SQLite is not supported for cluster mode (single-writer limitation).
clusterMode:
  enabled: false

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8765
  ## List of UDP ports to expose for snmp_trap source connectors.
  ## Each entry creates one UDP Service port and one containerPort.
  ## Must match the port: values in your snmp_trap pipeline YAMLs.
  ## Each port addition requires a `helm upgrade` to take effect.
  ## Example: [1162, 1163, 1164]
  snmpTrapPorts: []

## SQLite persistence for run history, pipeline versions, alert state, schemas, and MIBs.
## When enabled, a PVC is auto-provisioned per pod via volumeClaimTemplates and mounted at /data.
## TRAM_DB_PATH, TRAM_SCHEMA_DIR (/data/schemas), and TRAM_MIB_DIR (/data/mibs) are automatically
## pointed into this single volume — no separate PVCs needed.
## Standard MIBs (IF-MIB, ENTITY-MIB, HOST-RESOURCES-MIB, …) baked into the image at /mibs are
## still searched by SNMP connectors even when TRAM_MIB_DIR points to /data/mibs.
## NOTE: in cluster mode each pod gets its own /data PVC. Schemas/MIBs uploaded to tram-0 are not
## visible on tram-1. Pre-bake shared schemas into the image for cluster deployments.
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

## Environment variables (plain key/value)
env:
  TRAM_LOG_LEVEL: INFO
  TRAM_LOG_FORMAT: json
  # TRAM_NODE_ID: ""            # defaults to hostname (auto-set from pod name in StatefulSet)
  # TRAM_SHUTDOWN_TIMEOUT_SECONDS: "30"  # drain timeout before forced stop
  # --- Cluster (v0.8.0) ---
  # TRAM_CLUSTER_ENABLED: "true"         # enable when clusterMode.enabled=true
  # TRAM_HEARTBEAT_SECONDS: "10"
  # TRAM_NODE_TTL_SECONDS: "30"
  # --- Database (v0.7.0) ---
  # TRAM_DB_URL: ""             # Required for cluster mode (PostgreSQL or MariaDB)
  #                             # SQLite:     sqlite:////data/tram.db
  #                             # PostgreSQL: postgresql+psycopg2://user:pass@host/db
  #                             # MySQL:      mysql+pymysql://user:pass@host/db
  # --- SMTP (for alert email actions) ---
  # TRAM_SMTP_HOST: localhost
  # TRAM_SMTP_PORT: "587"
  # TRAM_SMTP_TLS: "true"
  # TRAM_SMTP_FROM: tram@localhost
  # --- Security (v1.0.0) ---
  # Note: API key is preferably set via .Values.apiKey (injected as TRAM_API_KEY automatically)
  # or via envSecret to avoid storing secrets in values.yaml.
  # TRAM_RATE_LIMIT: "0"          # requests/minute per client IP; 0 = disabled
  # TRAM_RATE_LIMIT_WINDOW: "60"  # sliding window in seconds
  # --- Observability (v1.0.0) ---
  # TRAM_OTEL_ENDPOINT: ""        # OTLP gRPC endpoint, e.g. http://otel-collector:4317
  # TRAM_OTEL_SERVICE: tram       # OpenTelemetry service.name attribute
  # --- Operations (v1.0.0) ---
  # TRAM_WATCH_PIPELINES: "false" # hot-reload pipelines on YAML change (requires tram[watch])
  # --- SNMP MIBs / Schemas (v1.0.3) ---
  # TRAM_MIB_DIR and TRAM_SCHEMA_DIR are auto-set to /data/mibs and /data/schemas when
  # persistence.enabled=true. Override here only if you need a custom location.
  # --- Schema Registry (v1.0.4) ---
  # Prefer using .Values.schemaRegistry below — it injects these vars automatically.

## Environment variables sourced from a Kubernetes Secret
## Use this for sensitive values (API keys, passwords) instead of plain env above.
## Example:
##   envSecret:
##     TRAM_API_KEY:
##       secretName: tram-secrets
##       secretKey: apiKey
##     TRAM_SMTP_USER:
##       secretName: tram-smtp
##       secretKey: username
##     TRAM_SMTP_PASS:
##       secretName: tram-smtp
##       secretKey: password
envSecret: {}

## External schema registry (v1.0.4)
## When url is set, TRAM_SCHEMA_REGISTRY_URL is injected automatically, enabling:
##   - /api/schemas/registry/* reverse proxy (for UI tools using a single origin)
##   - Avro and Protobuf serializers use this URL as the default registry client
##     (no need to repeat schema_registry_url: in every pipeline YAML)
## For sensitive credentials prefer envSecret instead of setting username/password here.
schemaRegistry:
  url: ""          # e.g. http://schema-registry:8081
  username: ""     # optional basic-auth username
  password: ""     # optional basic-auth password (use envSecret for production)

## Pipeline YAML files to mount as a ConfigMap at /pipelines
## Example:
##   pipelines:
##     minimal.yaml: |
##       pipeline:
##         name: minimal
##         ...
pipelines: {}

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

## Pod annotations (e.g., for Prometheus scraping)
podAnnotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8765"
  # prometheus.io/path: "/metrics"

serviceAccount:
  create: true
  ## If not set, a name is generated using the fullname template
  name: ""

## API key authentication (v1.0.0)
## Set apiKey to enable X-API-Key authentication on /api/* endpoints.
## Health probes (/api/health, /api/ready) and webhooks (/webhooks/) are always exempt.
apiKey: ""   # Also configurable via TRAM_API_KEY env var

## TLS configuration (v1.0.0)
## Mount a Kubernetes TLS secret and enable TLS for the uvicorn server.
## Create the secret with: kubectl create secret tls tram-tls --cert=tls.crt --key=tls.key
tls:
  enabled: false
  secretName: ""           # Name of a Kubernetes TLS secret (tls.crt / tls.key)
  certManagerIssuer: ""    # Optional: cert-manager ClusterIssuer name for automatic issuance

## Extra labels to add to all resources
extraLabels: {}
